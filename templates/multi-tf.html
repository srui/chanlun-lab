<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缠论K线 — 多周期联动分析</title>
<style>
:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --fg: #111111;
  --muted: #6B6B6B;
  --border: #E5E5E5;
  --accent: #2F6FEB;
  --success: #17A34A;
  --danger: #DC2626;
  --warn: #EAB308;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --radius: 8px;
  --radius-sm: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Nav ── */
.top-nav {
  display: flex; align-items: center; height: 44px; padding: 0 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  gap: 8px; flex-shrink: 0; z-index: 10;
}
.nav-logo { font-weight: 700; font-size: 14px; color: var(--fg); margin-right: 8px; white-space: nowrap; letter-spacing: -0.02em; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2px; }
.nav-links a { text-decoration: none; color: var(--muted); font-size: 12px; font-weight: 500; padding: 5px 8px; border-radius: var(--radius-sm); transition: all 0.15s; white-space: nowrap; }
.nav-links a:hover { color: var(--fg); background: var(--bg); }
.nav-links a.active { color: var(--accent); background: rgba(47,111,235,0.08); }

.market-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.market-toggle button {
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  border: none;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-body);
}
.market-toggle button.active {
  background: var(--accent);
  color: white;
}

/* ── Period pair selector ── */
.pair-bar {
  display: flex; align-items: center; height: 40px; padding: 0 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  gap: 6px; flex-shrink: 0; overflow-x: auto;
}
.pair-bar .pair-info {
  display: flex; align-items: center; gap: 8px; margin-right: 12px;
}
.pair-bar .symbol { font-weight: 700; font-size: 14px; font-family: var(--font-mono); }
.pair-bar .price { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--success); }
.pair-bar .change { font-family: var(--font-mono); font-size: 11px; padding: 2px 6px; border-radius: 3px; background: rgba(23,163,74,0.1); color: var(--success); }

.tf-pair-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); font-size: 11px; font-weight: 600; cursor: pointer;
  color: var(--muted); transition: all 0.15s; white-space: nowrap;
  font-family: var(--font-mono);
}
.tf-pair-btn:hover { border-color: var(--accent); color: var(--fg); }
.tf-pair-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tf-pair-btn .ctx { font-size: 9px; opacity: 0.7; margin-left: 2px; }

/* ── Summary bar ── */
.summary-bar {
  display: flex; align-items: center; height: 32px; padding: 0 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  gap: 16px; font-size: 11px; flex-shrink: 0; overflow-x: auto;
}
.summary-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.summary-item .label { color: var(--muted); }
.summary-item .value { font-weight: 600; }
.summary-item .value.green { color: var(--success); }
.summary-item .value.red { color: var(--danger); }
.summary-item .value.yellow { color: #B8860B; }
.verdict {
  margin-left: auto; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.verdict.bullish { background: rgba(23,163,74,0.1); color: var(--success); }
.verdict.bearish { background: rgba(220,38,38,0.1); color: var(--danger); }
.verdict.neutral { background: rgba(234,179,8,0.1); color: #B8860B; }

/* ── Chart layout ── */
.chart-area {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
  background: var(--surface);
}

.chart-panel {
  display: flex; flex-direction: column; min-height: 0; position: relative;
  border-bottom: 1px solid var(--border);
}
.chart-panel.main { flex: 3; }
.chart-panel.ctx { flex: 2; }

.chart-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 12px; background: var(--surface); border-bottom: 1px solid #F0F0F0;
  flex-shrink: 0; height: 28px;
}
.chart-panel-title {
  font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 6px;
}
.chart-panel-title .tf { color: var(--accent); font-family: var(--font-mono); font-size: 12px; }
.chart-panel-title .ctx-label { color: var(--muted); font-size: 10px; }

.chart-panel-tags {
  display: flex; gap: 4px;
}
.tag {
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px;
}
.tag.buy { background: rgba(23,163,74,0.1); color: var(--success); }
.tag.sell { background: rgba(220,38,38,0.1); color: var(--danger); }
.tag.zhongshu { background: rgba(234,179,8,0.1); color: #B8860B; }
.tag.info { background: rgba(47,111,235,0.1); color: var(--accent); }

.chart-panel canvas {
  flex: 1; width: 100%; display: block; cursor: crosshair;
}

/* ── Bottom alert ── */
.alert-bar {
  display: flex; align-items: center; height: 32px; padding: 0 12px;
  background: var(--surface); border-top: 1px solid var(--border);
  gap: 16px; font-size: 11px; flex-shrink: 0; overflow-x: auto;
}
.alert-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.green { background: var(--success); }
.dot.red { background: var(--danger); }
.dot.yellow { background: var(--warn); }

/* ── Responsive ── */
@media (max-width: 767px) {
  .nav-links a { padding: 5px 6px; font-size: 11px; }
  .summary-bar { flex-wrap: wrap; height: auto; padding: 6px 12px; gap: 6px; }
  .verdict { margin-left: 0; }
  .alert-bar { height: auto; padding: 6px 12px; flex-wrap: wrap; }
}

@media (max-width: 429px) {
  .summary-item .label { display: none; }
  .pair-bar .change { display: none; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">缠论<span>K线</span></div>
  <div class="nav-links">
    <a href="/chart">图表</a>
    <a href="/watchlist">自选</a>
    <a href="/signals">信号</a>
    <a href="/multi-tf" class="active">多周期</a>
    <a href="/settings">设置</a>
  </div>
</nav>

<div class="pair-bar">
  <div class="pair-info">
    <select id="symbolSelect" style="font-family:var(--font-mono);font-size:13px;font-weight:600;border:1px solid var(--border);border-radius:4px;padding:2px 6px;background:var(--surface);color:var(--fg);cursor:pointer">
    </select>
    <div class="market-toggle">
      <button data-market="spot">现货</button>
      <button data-market="futures">合约</button>
    </div>
    <span class="price" id="livePrice">--</span>
    <span class="change" id="pairChange" style="font-family:var(--font-mono);font-size:11px;padding:2px 6px;border-radius:3px">--%</span>

  <button class="tf-pair-btn active" data-main="5m" data-ctx="30m">5m<span class="ctx">/30m</span></button>
  <button class="tf-pair-btn" data-main="15m" data-ctx="1H">15m<span class="ctx">/1H</span></button>
  <button class="tf-pair-btn" data-main="30m" data-ctx="4H">30m<span class="ctx">/4H</span></button>
  <button class="tf-pair-btn" data-main="4H" data-ctx="1D">4H<span class="ctx">/1D</span></button>
  <button class="tf-pair-btn" data-main="1D" data-ctx="1W">1D<span class="ctx">/1W</span></button>
  <button class="tf-pair-btn" data-main="1W" data-ctx="1M">1W<span class="ctx">/1M</span></button>
</div>

<div class="summary-bar" id="summaryBar">
  <div class="summary-item">
    <span class="label">主周期</span>
    <span class="value" id="sumMain">5m</span>
  </div>
  <div class="summary-item">

  </div>
  <div class="summary-item">
    <span class="label">倍数</span>
    <span class="value" id="sumMul">×</span>
  </div>
  <div class="summary-item">
    <span class="label">主笔</span>
    <span class="value green" id="sumBi">&uarr; 上升笔</span>
  </div>
  <div class="summary-item">
    <span class="label">上级段</span>
    <span class="value" id="sumDuan">&uarr; 上升段</span>
  </div>
  <div class="summary-item">
    <span class="label">趋势</span>

  </div>
  <div class="verdict bullish" id="sumVerdict">多周期共振偏多 — 短线回调可加仓</div>
</div>

<div class="chart-area">
  <!-- Main period chart -->
  <div class="chart-panel main">
    <div class="chart-panel-header">
      <div class="chart-panel-title">
        <span class="tf" id="mainTfLabel">5m</span>
        <span>主周期 · 笔段中枢买卖点</span>
      </div>
      <div class="chart-panel-tags" id="mainTags">
        <span class="tag buy">二买确认</span>
        <span class="tag zhongshu">中枢震荡</span>
      </div>
    </div>
    <canvas id="mainCanvas"></canvas>
  </div>
  <!-- Context period chart -->
  <div class="chart-panel ctx">
    <div class="chart-panel-header">
      <div class="chart-panel-title">
        <span class="tf" id="ctxTfLabel">30m</span>
        <span class="ctx-label">上级周期 · 大级别方向</span>
      </div>
      <div class="chart-panel-tags" id="ctxTags">
        <span class="tag info">上升段</span>
      </div>
    </div>
    <canvas id="ctxCanvas"></canvas>
  </div>
</div>

<div class="alert-bar">
  <div class="alert-item"><span class="dot yellow"></span><strong>5m</strong> 顶背驰预警</div>
  <div class="alert-item"><span class="dot green"></span><strong>30m</strong> 二买确认</div>
  <div class="alert-item"><span class="dot green"></div><strong>BTC/USDT</strong> 多周期共振做多</div>
</div>

<script>
// ── Period Pair Config ──
const PERIOD_PAIRS = {
  '5m':  { ctx: '30m', mul: 6,  mainLabel: '5m',  ctxLabel: '30m' },
  '15m': { ctx: '1h',  mul: 4,  mainLabel: '15m', ctxLabel: '1H' },
  '30m': { ctx: '4h',  mul: 8,  mainLabel: '30m', ctxLabel: '4H' },
  '4H':  { ctx: '1d',  mul: 6,  mainLabel: '4H',  ctxLabel: '1D' },
  '1D':  { ctx: '1w',  mul: 7,  mainLabel: '1D',  ctxLabel: '1W' },
  '1W':  { ctx: '1M',  mul: 4,  mainLabel: '1W',  ctxLabel: '1M' },
};

let currentMain = '5m';
const _urlParams = new URLSearchParams(window.location.search);
let currentSymbol = _urlParams.get('symbol') || 'BTCUSDT';
let currentMarketType = localStorage.getItem('chanlun_market_type') || 'spot';

// ── Read settings from localStorage ──
function getMinKlineGap() {
  try {
    const s = JSON.parse(localStorage.getItem('chanlun_settings'));
    if (s && s['input_0'] !== undefined) return parseInt(s['input_0']);
  } catch(e) {}
  return 4;
}
function getMinSegmentRatio() {
  try {
    const s = JSON.parse(localStorage.getItem('chanlun_settings'));
    const sel = s && s['input_3'];
    if (sel === '高灵敏度') return 0.03;
    if (sel === '低灵敏度') return 0.08;
  } catch(e) {}
  return 0.05;
}

// ── Transform API data → chart format ──
function transformKlines(klines) {
  return klines.map(k => ({
    time: new Date(k.openTime),
    open: k.open, high: k.high, low: k.low, close: k.close, volume: k.volume
  }));
}

function apiResultToChan(result) {
  if (!result) return { biPoints: [], duanSegments: [], zhongshuZones: [], signals: [] };
  const fractals = result.fractals || [];
  const segments = result.segments || [];
  const zs = result.zhongshu || [];
  const bs = result.buySellPoints || [];
  const segZhongshu = result.segmentZhongshu || [];

  const biPoints = fractals.map(f => ({ idx: f.klineIdx, price: f.price, type: f.type }));

  const duanSegments = segments.map(seg => {
    const f = fractals[seg.fromIdx], t = fractals[seg.toIdx];
    return { start: f ? f.klineIdx : 0, end: t ? t.klineIdx : 0, direction: f && t ? (t.price > f.price ? 'up' : 'down') : 'up' };
  });

  const allZs = [];
  zs.forEach(z => {
    const f = fractals[z.fromIdx], t = fractals[z.toIdx];
    if (f && t) allZs.push({ startIdx: f.klineIdx, endIdx: t.klineIdx, highPrice: z.zg, lowPrice: z.zd, label: '中枢 ' + (allZs.length + 1) });
  });
  segZhongshu.forEach(z => {
    const f = fractals[z.fromIdx], t = fractals[z.toIdx];
    if (f && t) allZs.push({ startIdx: f.klineIdx, endIdx: t.klineIdx, highPrice: z.zg, lowPrice: z.zd, label: '段中枢 ' + (allZs.length + 1) });
  });

  const LABEL_MAP = { '1': { buy: '一买', sell: '一卖' }, '2': { buy: '二买', sell: '二卖' }, '3': { buy: '三买', sell: '三卖' } };
  const signals = bs.map(s => {
    const f = fractals[s.idx];
    const lbl = LABEL_MAP[s.label] || {};
    return { idx: f ? f.klineIdx : 0, price: f ? f.price : 0, type: s.type + s.label, label: (lbl[s.type] || s.label) };
  });

  return { biPoints, duanSegments, zhongshuZones: allZs, signals };
}

// ── Chart Engine (shared) ──
class ChanChart {
  constructor(canvasId, data, chan, opts = {}) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.data = data;
    this.chan = chan;
    this.W = 0; this.H = 0; this.dpr = 1;
    this.pad = { top: 24, right: 64, bottom: 28, left: 6 };
    this.visibleCount = opts.visibleCount || 80;
    this.scrollPos = Math.max(0, data.length - this.visibleCount);
    this.crosshair = null;
    this.isDragging = false;
    this.dragStartX = 0;
    this.dragStartScroll = 0;
    this.velocity = 0;
    this.lastMoveX = 0;
    this.lastMoveTime = 0;
    this.inertiaRaf = null;
    this.showLabels = opts.showLabels !== false;
    this.highlightBar = opts.highlightBar || null;

    this._bind();
    this.resize();
  }

  _bind() {
    const c = this.canvas;
    // Resize
    this._resizeHandler = () => this.resize();
    window.addEventListener('resize', this._resizeHandler);

    // Mouse
    c.addEventListener('mousedown', e => this._onMouseDown(e));
    window.addEventListener('mousemove', e => this._onMouseMove(e));
    window.addEventListener('mouseup', () => this._onMouseUp());
    c.addEventListener('mouseleave', () => { if (!this.isDragging) { this.crosshair = null; this.queueRender(); } });

    // Touch
    c.addEventListener('touchstart', e => this._onTouchStart(e), { passive: false });
    c.addEventListener('touchmove', e => this._onTouchMove(e), { passive: false });
    c.addEventListener('touchend', () => this._startInertia());

    // Wheel
    c.addEventListener('wheel', e => this._onWheel(e), { passive: false });
  }

  resize() {
    const rect = this.canvas.parentElement.getBoundingClientRect();
    const headerH = 28;
    this.dpr = window.devicePixelRatio || 1;
    this.W = rect.width;
    this.H = rect.height - headerH;
    this.canvas.width = this.W * this.dpr;
    this.canvas.height = this.H * this.dpr;
    this.canvas.style.width = this.W + 'px';
    this.canvas.style.height = this.H + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.queueRender();
  }

  queueRender() {
    if (!this._raf) {
      this._raf = true;
      requestAnimationFrame(() => { this._raf = false; this.render(); });
    }
  }

  _clamp() {
    this.scrollPos = Math.max(0, Math.min(this.data.length - this.visibleCount, this.scrollPos));
  }

  _cancelInertia() { if (this.inertiaRaf) { cancelAnimationFrame(this.inertiaRaf); this.inertiaRaf = null; } }

  _startInertia() {
    if (Math.abs(this.velocity) < 1) return;
    const chartW = this.W - this.pad.left - this.pad.right;
    const step = () => {
      const ppc = chartW / this.visibleCount;
      this.scrollPos -= this.velocity / ppc;
      this._clamp();
      this.velocity *= 0.93;
      if (this.scrollPos <= 0 || this.scrollPos >= this.data.length - this.visibleCount) this.velocity = 0;
      this.queueRender();
      if (Math.abs(this.velocity) > 0.5) this.inertiaRaf = requestAnimationFrame(step);
    };
    this.inertiaRaf = requestAnimationFrame(step);
  }

  _onMouseDown(e) {
    this.isDragging = true;
    this.dragStartX = e.clientX;
    this.dragStartScroll = this.scrollPos;
    this.velocity = 0;
    this.lastMoveX = e.clientX;
    this.lastMoveTime = performance.now();
    this.canvas.style.cursor = 'grabbing';
    this.crosshair = null;
    this._cancelInertia();
  }

  _onMouseMove(e) {
    if (this.isDragging) {
      const dx = e.clientX - this.dragStartX;
      const chartW = this.W - this.pad.left - this.pad.right;
      this.scrollPos = this.dragStartScroll - dx / (chartW / this.visibleCount);
      this._clamp();
      const now = performance.now();
      const dt = now - this.lastMoveTime;
      if (dt > 0) this.velocity = (e.clientX - this.lastMoveX) / dt * 16;
      this.lastMoveX = e.clientX;
      this.lastMoveTime = now;
      this.queueRender();
    } else {
      const rect = this.canvas.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        this.crosshair = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        this.queueRender();
      }
    }
  }

  _onMouseUp() {
    if (this.isDragging) {
      this.isDragging = false;
      this.canvas.style.cursor = 'crosshair';
      this._startInertia();
    }
  }

  _onTouchStart(e) {
    e.preventDefault();
    this._cancelInertia();
    if (e.touches.length === 1) {
      this.dragStartX = e.touches[0].clientX;
      this.dragStartScroll = this.scrollPos;
      this.velocity = 0;
      this.lastMoveX = e.touches[0].clientX;
      this.lastMoveTime = performance.now();
      this.crosshair = null;
    }
  }

  _onTouchMove(e) {
    e.preventDefault();
    if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - this.dragStartX;
      const chartW = this.W - this.pad.left - this.pad.right;
      this.scrollPos = this.dragStartScroll - dx / (chartW / this.visibleCount);
      this._clamp();
      const now = performance.now();
      const dt = now - this.lastMoveTime;
      if (dt > 0) this.velocity = (e.touches[0].clientX - this.lastMoveX) / dt * 16;
      this.lastMoveX = e.touches[0].clientX;
      this.lastMoveTime = now;
      this.queueRender();
    }
  }

  _onWheel(e) {
    e.preventDefault();
    const rect = this.canvas.getBoundingClientRect();
    const cursorX = e.clientX - rect.left;
    const chartW = this.W - this.pad.left - this.pad.right;
    const candleAtCursor = this.scrollPos + (cursorX - this.pad.left) / (chartW / this.visibleCount);
    const step = (e.ctrlKey || e.metaKey) ? 1 : (e.deltaY > 0 ? 5 : -5);
    const newCount = Math.max(30, Math.min(this.data.length, this.visibleCount + step));
    if (newCount !== this.visibleCount) {
      this.visibleCount = newCount;
      this.scrollPos = candleAtCursor - (cursorX - this.pad.left) / (chartW / this.visibleCount);
      this._clamp();
      this.queueRender();
    }
  }

  _idxToX(idx) {
    const chartW = this.W - this.pad.left - this.pad.right;
    const cw = chartW / this.visibleCount;
    return this.pad.left + (idx - this.scrollPos) * cw + cw / 2;
  }

  _priceToY(price, pMin, pMax, cH) {
    return this.pad.top + cH - ((price - pMin) / (pMax - pMin)) * cH;
  }

  render() {
    const { ctx, W, H, pad, data, chan } = this;
    if (!W || !H) return;

    const chartH = H - pad.top - pad.bottom;
    const chartW = W - pad.left - pad.right;
    const cw = chartW / this.visibleCount;

    ctx.clearRect(0, 0, W, H);

    const si = Math.floor(this.scrollPos);
    const vis = data.slice(si, si + this.visibleCount + 2);
    if (!vis.length) return;

    let pMin = Infinity, pMax = -Infinity, volMax = 0;
    vis.forEach(d => { pMin = Math.min(pMin, d.low); pMax = Math.max(pMax, d.high); volMax = Math.max(volMax, d.volume); });
    const pp = (pMax - pMin) * 0.06;
    pMin -= pp; pMax += pp;

    // Grid
    ctx.strokeStyle = '#F0F0F0'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (chartH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
      const p = pMax - (pMax - pMin) * (i / 4);
      ctx.fillStyle = '#999'; ctx.font = '9px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
      ctx.textAlign = 'left';
      ctx.fillText(p.toLocaleString('en', { maximumFractionDigits: 0 }), W - pad.right + 4, y + 3);
    }

    // Zhongshu
    chan.zhongshuZones.forEach(z => {
      const x1 = this._idxToX(z.startIdx) - cw / 2;
      const x2 = this._idxToX(z.endIdx) + cw / 2;
      const y1 = this._priceToY(z.highPrice, pMin, pMax, chartH);
      const y2 = this._priceToY(z.lowPrice, pMin, pMax, chartH);
      if (x2 < pad.left || x1 > W - pad.right) return;
      ctx.fillStyle = 'rgba(234,179,8,0.07)';
      ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
      ctx.strokeStyle = 'rgba(234,179,8,0.25)'; ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 2]); ctx.strokeRect(x1, y1, x2 - x1, y2 - y1); ctx.setLineDash([]);
      if (this.showLabels) {
        ctx.fillStyle = 'rgba(180,140,0,0.5)'; ctx.font = '9px system-ui';
        ctx.textAlign = 'left'; ctx.fillText(z.label, x1 + 3, y1 + 10);
      }
    });

    // Duan segments
    ctx.lineWidth = 2;
    chan.duanSegments.forEach(seg => {
      const x1 = this._idxToX(seg.start), x2 = this._idxToX(seg.end);
      if (x2 < pad.left || x1 > W - pad.right) return;
      const sb = chan.biPoints.find(p => p.idx === seg.start);
      const eb = chan.biPoints.find(p => p.idx === seg.end);
      if (!sb || !eb) return;
      const y1 = this._priceToY(sb.price, pMin, pMax, chartH);
      const y2 = this._priceToY(eb.price, pMin, pMax, chartH);
      ctx.strokeStyle = 'rgba(139,92,246,0.5)';
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    });

    // Candles
    vis.forEach((d, i) => {
      const x = pad.left + (si + i - this.scrollPos) * cw;
      if (x + cw < pad.left || x > W - pad.right) return;
      const isUp = d.close >= d.open;
      const color = isUp ? '#17A34A' : '#DC2626';
      const bTop = this._priceToY(Math.max(d.open, d.close), pMin, pMax, chartH);
      const bBot = this._priceToY(Math.min(d.open, d.close), pMin, pMax, chartH);
      const wTop = this._priceToY(d.high, pMin, pMax, chartH);
      const wBot = this._priceToY(d.low, pMin, pMax, chartH);
      ctx.strokeStyle = color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + cw / 2, wTop); ctx.lineTo(x + cw / 2, wBot); ctx.stroke();
      if (isUp) { ctx.strokeRect(x + 0.5, bTop + 0.5, cw - 1, Math.max(1, bBot - bTop)); }
      else { ctx.fillStyle = color; ctx.fillRect(x, bTop, cw, Math.max(1, bBot - bTop)); }
    });

    // Volume
    const volH = 30; const volBase = H - 4;
    vis.forEach((d, i) => {
      const x = pad.left + (si + i - this.scrollPos) * cw;
      if (x + cw < pad.left || x > W - pad.right) return;
      const isUp = d.close >= d.open;
      const bh = (d.volume / volMax) * volH;
      ctx.fillStyle = isUp ? 'rgba(23,163,74,0.12)' : 'rgba(220,38,38,0.12)';
      ctx.fillRect(x, volBase - bh, cw, bh);
    });

    // Bi segments
    ctx.lineWidth = 1.5;
    for (let i = 0; i < chan.biPoints.length - 1; i++) {
      const p1 = chan.biPoints[i], p2 = chan.biPoints[i + 1];
      const x1 = this._idxToX(p1.idx), x2 = this._idxToX(p2.idx);
      if (Math.max(x1, x2) < pad.left || Math.min(x1, x2) > W - pad.right) continue;
      const y1 = this._priceToY(p1.price, pMin, pMax, chartH);
      const y2 = this._priceToY(p2.price, pMin, pMax, chartH);
      ctx.strokeStyle = '#2F6FEB'; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      [p1, p2].forEach(p => {
        const px = this._idxToX(p.idx);
        if (px < pad.left || px > W - pad.right) return;
        const py = this._priceToY(p.price, pMin, pMax, chartH);
        ctx.fillStyle = '#2F6FEB'; ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2); ctx.fill();
      });
    }

    // Signals
    chan.signals.forEach(s => {
      const x = this._idxToX(s.idx);
      if (x < pad.left || x > W - pad.right) return;
      const isBuy = s.type.startsWith('buy');
      const yOff = isBuy ? 14 : -14;
      const y = this._priceToY(s.price, pMin, pMax, chartH) + yOff;
      ctx.fillStyle = isBuy ? '#17A34A' : '#DC2626';
      ctx.beginPath();
      if (isBuy) { ctx.moveTo(x, y - 8); ctx.lineTo(x - 5, y); ctx.lineTo(x + 5, y); }
      else { ctx.moveTo(x, y + 8); ctx.lineTo(x - 5, y); ctx.lineTo(x + 5, y); }
      ctx.fill();
      if (this.showLabels) {
        ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center';
        ctx.fillText(s.label, x, isBuy ? y - 10 : y + 18);
      }
    });

    // Last price line
    const last = data[data.length - 1];
    if (last) {
      const ly = this._priceToY(last.close, pMin, pMax, chartH);
      const isUp = last.close >= last.open;
      ctx.strokeStyle = isUp ? '#17A34A' : '#DC2626'; ctx.lineWidth = 0.7;
      ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(pad.left, ly); ctx.lineTo(W - pad.right, ly); ctx.stroke(); ctx.setLineDash([]);
      const ps = last.close.toLocaleString('en', { maximumFractionDigits: 0 });
      ctx.fillStyle = isUp ? '#17A34A' : '#DC2626';
      ctx.fillRect(W - pad.right, ly - 7, ctx.measureText(ps).width + 10, 14);
      ctx.fillStyle = '#fff'; ctx.font = '9px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
      ctx.textAlign = 'left'; ctx.fillText(ps, W - pad.right + 4, ly + 3);
    }

    // Highlight bar (for context period sync)
    if (this.highlightBar !== null) {
      const hx1 = this._idxToX(this.highlightBar.start) - cw / 2;
      const hx2 = this._idxToX(this.highlightBar.end) + cw / 2;
      ctx.fillStyle = 'rgba(47,111,235,0.06)';
      ctx.fillRect(hx1, pad.top, hx2 - hx1, chartH);
      ctx.strokeStyle = 'rgba(47,111,235,0.25)'; ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]); ctx.strokeRect(hx1, pad.top, hx2 - hx1, chartH); ctx.setLineDash([]);
    }

    // Time axis
    const tstep = Math.max(1, Math.round(60 / Math.max(1, cw)));
    ctx.fillStyle = '#999'; ctx.font = '8px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
    ctx.textAlign = 'center';
    for (let i = 0; i < vis.length; i += tstep) {
      const x = pad.left + (si + i - this.scrollPos) * cw + cw / 2;
      if (x < pad.left || x > W - pad.right) continue;
      const d = vis[i].time;
      const label = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      ctx.fillText(label, x, H - 4);
    }

    // Crosshair + OHLCV tooltip
    if (this.crosshair) {
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 0.5; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(this.crosshair.x, pad.top); ctx.lineTo(this.crosshair.x, H - pad.bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pad.left, this.crosshair.y); ctx.lineTo(W - pad.right, this.crosshair.y); ctx.stroke();
      ctx.setLineDash([]);

      // Price label on Y axis
      const crossPrice = pMax - (this.crosshair.y - pad.top) / chartH * (pMax - pMin);
      const cpStr = crossPrice.toLocaleString('en', { maximumFractionDigits: 2 });
      const cpTw = ctx.measureText(cpStr).width;
      ctx.fillStyle = '#333';
      ctx.fillRect(W - pad.right, this.crosshair.y - 7, cpTw + 10, 14);
      ctx.fillStyle = '#fff'; ctx.font = '9px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
      ctx.textAlign = 'left'; ctx.fillText(cpStr, W - pad.right + 4, this.crosshair.y + 3);

      // Find candle under crosshair
      const candleGlobalIdx = Math.floor(this.scrollPos + (this.crosshair.x - pad.left) / cw);
      if (candleGlobalIdx >= 0 && candleGlobalIdx < data.length) {
        const cd = data[candleGlobalIdx];
        const isUp = cd.close >= cd.open;
        const cls = isUp ? '#17A34A' : '#DC2626';

        // Draw OHLCV tooltip box in top-right
        const ttX = W - pad.right - 8;
        const mm = (cd.time.getMonth() + 1).toString().padStart(2, '0');
        const dd = cd.time.getDate().toString().padStart(2, '0');
        const hh = cd.time.getHours().toString().padStart(2, '0');
        const mi = cd.time.getMinutes().toString().padStart(2, '0');
        const ttLines = [
          mm + '/' + dd + ' ' + hh + ':' + mi,
          'O ' + cd.open.toLocaleString('en', { maximumFractionDigits: 2 }),
          'H ' + cd.high.toLocaleString('en', { maximumFractionDigits: 2 }),
          'L ' + cd.low.toLocaleString('en', { maximumFractionDigits: 2 }),
          'C ' + cd.close.toLocaleString('en', { maximumFractionDigits: 2 }),
          'V ' + cd.volume.toLocaleString('en', { maximumFractionDigits: 0 }),
        ];
        ctx.font = '9px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
        let maxTW = 0;
        ttLines.forEach(l => { maxTW = Math.max(maxTW, ctx.measureText(l).width); });
        const boxW = maxTW + 14;
        const boxH = ttLines.length * 13 + 8;
        const boxX = ttX - boxW;
        const boxY = pad.top + 2;

        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.fillRect(boxX, boxY, boxW, boxH);
        ctx.strokeStyle = '#E5E5E5'; ctx.lineWidth = 0.5;
        ctx.strokeRect(boxX, boxY, boxW, boxH);

        ctx.textAlign = 'left';
        ttLines.forEach((line, li) => {
          if (li === 0) {
            ctx.fillStyle = '#6B6B6B';
          } else if (li === 4) { // Close line
            ctx.fillStyle = cls;
          } else if (li <= 3) { // O/H/L
            ctx.fillStyle = cls;
          } else {
            ctx.fillStyle = '#6B6B6B';
          }
          ctx.fillText(line, boxX + 7, boxY + 12 + li * 13);
        });
      }
    }
  }
}

// ── State ──
let mainChart = null, ctxChart = null;
let mainData = null, ctxData = null;
let mainChan = null, ctxChan = null;

async function buildPair(mainKey) {
  const pair = PERIOD_PAIRS[mainKey];
  // Normalize interval for API (4H→4h, 1D→1d, etc.)
  const mainIv = mainKey.replace('H', 'h').replace('D', 'd').replace('W', 'w');
  const ctxIv = pair.ctx;

  try {
    const res = await fetch('/api/compute/dual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol: currentSymbol, interval: mainIv, contextInterval: ctxIv, limit: 300, minSegmentRatio: getMinSegmentRatio(), minKlineGap: getMinKlineGap(), marketType: currentMarketType })
    });
    const data = await res.json();
    if (data.error) { console.error('API error:', data.error); return; }

    const primary = data.primary;
    const context = data.context;

    mainData = transformKlines(primary.klines || []);
    mainChan = apiResultToChan(primary);

    ctxData = context ? transformKlines(context.klines || []) : [];
    ctxChan = context ? apiResultToChan(context) : { biPoints: [], duanSegments: [], zhongshuZones: [], signals: [] };
  } catch (err) {
    console.error('Failed to load dual data:', err);
    return;
  }

  // Update labels
  document.getElementById('mainTfLabel').textContent = pair.mainLabel;
  document.getElementById('ctxTfLabel').textContent = pair.ctxLabel;
  document.getElementById('sumMain').textContent = pair.mainLabel;
  document.getElementById('sumCtx').textContent = pair.ctxLabel;
  document.getElementById('sumMul').textContent = '×' + pair.mul;

  // Analyze chan status
  const lastBi = mainChan.biPoints[mainChan.biPoints.length - 1];
  const lastCtxDuan = ctxChan.duanSegments[ctxChan.duanSegments.length - 1];
  const mainBiDir = lastBi ? (lastBi.type === 'bottom' ? '↑ 上升笔' : '↓ 下降笔') : '—';
  const ctxDuanDir = lastCtxDuan ? (lastCtxDuan.direction === 'up' ? '↑ 上升段' : '↓ 下降段') : '—';
  const mainBiColor = lastBi && lastBi.type === 'bottom' ? 'green' : 'red';
  const ctxDuanColor = lastCtxDuan && lastCtxDuan.direction === 'up' ? '' : 'red';

  document.getElementById('sumBi').textContent = mainBiDir;
  document.getElementById('sumBi').className = 'value ' + mainBiColor;
  document.getElementById('sumDuan').textContent = ctxDuanDir;
  if (ctxDuanColor) document.getElementById('sumDuan').className = 'value ' + ctxDuanColor;

  // Resonance verdict
  const mainBull = lastBi && lastBi.type === 'bottom';
  const ctxBull = lastCtxDuan && lastCtxDuan.direction === 'up';
  const verdictEl = document.getElementById('sumVerdict');
  const trendEl = document.getElementById('sumTrend');

  if (mainBull && ctxBull) {
    verdictEl.textContent = '多周期共振偏多 — 短线回调可加仓';
    verdictEl.className = 'verdict bullish';
    trendEl.textContent = '共振做多';
    trendEl.className = 'value green';
  } else if (!mainBull && !ctxBull) {
    verdictEl.textContent = '多周期共振偏空 — 观望或减仓';
    verdictEl.className = 'verdict bearish';
    trendEl.textContent = '共振做空';
    trendEl.className = 'value red';
  } else {
    verdictEl.textContent = '周期方向不一 — 谨慎操作';
    verdictEl.className = 'verdict neutral';
    trendEl.textContent = '方向分歧';
    trendEl.className = 'value yellow';
  }

  // Tags
  const mainTags = document.getElementById('mainTags');
  const mainSigs = mainChan.signals.slice(-3);
  mainTags.innerHTML = mainSigs.map(s => {
    const cls = s.type.startsWith('buy') ? 'buy' : 'sell';
    return '<span class="tag ' + cls + '">' + s.label + '</span>';
  }).join('');
  if (mainChan.zhongshuZones.length > 0) {
    mainTags.innerHTML += '<span class="tag zhongshu">中枢震荡</span>';
  }

  const ctxTags = document.getElementById('ctxTags');
  ctxTags.innerHTML = '<span class="tag info">' + ctxDuanDir + '</span>';
  const ctxSigs = ctxChan.signals.slice(-2);
  ctxTags.innerHTML += ctxSigs.map(s => {
    const cls = s.type.startsWith('buy') ? 'buy' : 'sell';
    return '<span class="tag ' + cls + '">' + s.label + '</span>';
  }).join('');

  // Cleanup old charts
  if (mainChart) { window.removeEventListener('resize', mainChart._resizeHandler); }
  if (ctxChart) { window.removeEventListener('resize', ctxChart._resizeHandler); }

  mainChart = new ChanChart('mainCanvas', mainData, mainChan, { visibleCount: 80, showLabels: true });
  ctxChart = new ChanChart('ctxCanvas', ctxData, ctxChan, { visibleCount: 60, showLabels: true });

  // Sync scrolling: time-based alignment between main and context charts
  const origMainRender = mainChart.render.bind(mainChart);
  mainChart.render = function() {
    origMainRender();
    if (!ctxChart || ctxChart.data.length === 0 || mainData.length === 0) return;

    const si = Math.floor(mainChart.scrollPos);
    const ei = Math.min(si + mainChart.visibleCount, mainData.length - 1);
    if (si >= mainData.length) return;

    // Get time range of visible main candles
    const tStart = mainData[si].time.getTime();
    const tEnd = mainData[ei].time.getTime();

    // Find matching context candle indices by time
    let ctxStartIdx = 0, ctxEndIdx = ctxChart.data.length - 1;
    for (let i = 0; i < ctxChart.data.length; i++) {
      if (ctxChart.data[i].time.getTime() <= tStart) ctxStartIdx = i;
    }
    for (let i = ctxChart.data.length - 1; i >= 0; i--) {
      if (ctxChart.data[i].time.getTime() >= tEnd) { ctxEndIdx = i; break; }
    }

    ctxChart.highlightBar = { start: ctxStartIdx, end: ctxEndIdx };

    // Auto-scroll context chart so highlighted region is centered
    const ctxMid = (ctxStartIdx + ctxEndIdx) / 2;
    const targetScroll = ctxMid - ctxChart.visibleCount / 2;
    ctxChart.scrollPos = Math.max(0, Math.min(ctxChart.data.length - ctxChart.visibleCount, targetScroll));

    ctxChart.queueRender();
  };

  // Update live price
  const last = mainData[mainData.length - 1];
  if (last) {
    document.getElementById('livePrice').textContent = last.close.toLocaleString('en', { maximumFractionDigits: 0 });
    // Fetch real price with change
    fetch('/api/price?symbol=' + currentSymbol + '&interval=' + mainIv + '&marketType=' + currentMarketType).then(r => r.json()).then(d => {
      if (d.price) document.getElementById('livePrice').textContent = d.price.toLocaleString('en', { maximumFractionDigits: 2 });
      if (d.change != null) {
        const el = document.getElementById('pairChange');
        el.textContent = (d.change >= 0 ? '+' : '') + d.change.toFixed(2) + '%';
        el.className = 'change ' + (d.change >= 0 ? '' : 'down');
        el.style.background = d.change >= 0 ? 'rgba(23,163,74,0.1)' : 'rgba(220,38,38,0.1)';
        el.style.color = d.change >= 0 ? 'var(--success)' : 'var(--danger)';
      }
    }).catch(() => {});
  }
}

// Period pair buttons
document.querySelectorAll('.tf-pair-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-pair-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMain = btn.dataset.main;
    buildPair(currentMain);
  });
});

// Symbol select — populate from localStorage watchlist
const _DEFAULT_SYMBOLS = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','DOTUSDT','LINKUSDT'];
function _getSymbolList() {
  try {
    const saved = JSON.parse(localStorage.getItem('chanlun_watchlist'));
    if (Array.isArray(saved) && saved.length > 0) return saved;
  } catch(e) {}
  return _DEFAULT_SYMBOLS;
}
const symbolSelect = document.getElementById('symbolSelect');
_getSymbolList().forEach(sym => {
  const opt = document.createElement('option');
  opt.value = sym;
  opt.textContent = sym.replace('USDT', '/USDT');
  symbolSelect.appendChild(opt);
});
if (_urlParams.get('symbol')) symbolSelect.value = _urlParams.get('symbol');
symbolSelect.addEventListener('change', () => {
  currentSymbol = symbolSelect.value;
  buildPair(currentMain);
});

// Market type toggle
document.querySelectorAll('.market-toggle button').forEach(btn => {
  if (btn.dataset.market === currentMarketType) btn.classList.add('active');
  else btn.classList.remove('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('.market-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMarketType = btn.dataset.market;
    localStorage.setItem('chanlun_market_type', currentMarketType);
    buildPair(currentMain);
  });
});

// Initial build
buildPair('5m');

// Auto-refresh every 30s
setInterval(() => { buildPair(currentMain); }, 30000);
</script>
