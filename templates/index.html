<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>缠论笔段标注工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: "PingFang SC","Microsoft YaHei",sans-serif; }

/* Layout */
.app { display: flex; height: 100vh; }
.sidebar { width: 280px; background: #16213e; border-right: 1px solid #1a3a5c; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar for K-line controls */
.topbar {
  background: #16213e; border-bottom: 1px solid #1a3a5c;
  padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.topbar .tb-group { display: flex; align-items: center; gap: 6px; }
.topbar .tb-divider { width: 1px; height: 24px; background: #1a3a5c; margin: 0 4px; }
.topbar .tb-status { font-size: 12px; color: #5577aa; margin-left: auto; white-space: nowrap; }
.topbar select, .topbar input[type="text"], .topbar input[type="number"] {
  background: #0f3460; border: 1px solid #1a3a5c; color: #e0e0e0; padding: 5px 8px;
  border-radius: 6px; font-size: 13px; outline: none; height: 32px;
}
.topbar input[type="text"] { width: 100px; }
.topbar input[type="number"] { width: 60px; }
.topbar select { width: 72px; cursor: pointer; }
.topbar select:focus, .topbar input:focus { border-color: #00d4ff; }

.chart-area { flex: 1; position: relative; overflow: hidden; }
#chart { width: 100%; height: 100%; }

/* Sidebar sections */
.panel { padding: 14px 16px; border-bottom: 1px solid #1a3a5c; }
.panel-title { font-size: 13px; color: #00d4ff; margin-bottom: 10px; font-weight: bold; letter-spacing: 1px; }

/* Input row */
.input-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
select, input[type="number"], input[type="text"] {
  background: #0f3460; border: 1px solid #1a3a5c; color: #e0e0e0; padding: 6px 8px;
  border-radius: 6px; font-size: 13px; outline: none;
}
select:focus, input:focus { border-color: #00d4ff; }
select { width: 80px; cursor: pointer; }
input[type="number"] { flex: 1; width: 0; }
.input-label { color: #667799; font-size: 12px; white-space: nowrap; }

/* Buttons */
.btn {
  padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: #0f3460; color: #00d4ff; border: 1px solid #00d4ff; }
.btn-primary:hover { background: #00d4ff; color: #1a1a2e; }
.btn-success { background: #0f3460; color: #51cf66; border: 1px solid #51cf66; }
.btn-success:hover { background: #51cf66; color: #1a1a2e; }
.btn-danger { background: #0f3460; color: #ff6b6b; border: 1px solid #ff6b6b; }
.btn-danger:hover { background: #ff6b6b; color: #1a1a2e; }
.btn-warn { background: #0f3460; color: #ffc832; border: 1px solid #ffc832; }
.btn-warn:hover { background: #ffc832; color: #1a1a2e; }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-row .btn { flex: 1; text-align: center; }
.btn-toggle { font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid; cursor: pointer; float: right; line-height: 16px; }
.btn-toggle.on { background: #0f3460; color: #51cf66; border-color: #51cf66; }
.btn-toggle.off { background: #1a1a2e; color: #5577aa; border-color: #5577aa; }

/* Stroke list */
.stroke-list { max-height: 200px; overflow-y: auto; margin-top: 4px; }
.stroke-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; border-radius: 4px; font-size: 13px; margin-bottom: 2px;
  font-family: "SF Mono","Menlo",monospace;
}
.stroke-item:hover { background: rgba(255,255,255,0.04); }
.stroke-item .dir { font-weight: bold; width: 50px; }
.stroke-item .dir.down { color: #ff6b6b; }
.stroke-item .dir.up { color: #51cf66; }
.stroke-item .val { color: #aabbcc; flex: 1; text-align: right; margin-right: 8px; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background .15s; }
.stroke-item .val:hover { background: rgba(0,212,255,0.12); }
.stroke-item .val-input { background: #0a1628; border: 1px solid #00d4ff; color: #e0e0e0; padding: 2px 4px; border-radius: 4px; font-size: 13px; width: 70px; text-align: right; outline: none; font-family: "SF Mono","Menlo",monospace; }
.stroke-item .del { color: #555; cursor: pointer; font-size: 16px; line-height: 1; }
.stroke-item .del:hover { color: #ff6b6b; }

/* Segment list */
.seg-list { max-height: 180px; overflow-y: auto; margin-top: 4px; }
.seg-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 2px;
  font-family: "SF Mono","Menlo",monospace;
}
.seg-item .dir { font-weight: bold; width: 36px; }
.seg-item .dir.down { color: #ff6b6b; }
.seg-item .dir.up { color: #51cf66; }
.seg-item .range { color: #aabbcc; flex: 1; }
.seg-item .del { color: #555; cursor: pointer; font-size: 16px; }
.seg-item .del:hover { color: #ff6b6b; }

/* 中枢 list */
.zs-list { max-height: 180px; overflow-y: auto; margin-top: 4px; }
.zs-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 2px;
  font-family: "SF Mono","Menlo",monospace;
}
.zs-item .range { color: #ffc832; flex: 1; }
.zs-item .del { color: #555; cursor: pointer; font-size: 16px; }
.zs-item .del:hover { color: #ff6b6b; }

/* Drawing mode indicator */
.draw-hint {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(255,200,50,0.15); border: 1px solid #ffc832; color: #ffc832;
  padding: 6px 16px; border-radius: 20px; font-size: 13px; display: none;
  pointer-events: none; z-index: 10;
}

/* Export area */
.export-area { padding: 16px; border-top: 1px solid #1a3a5c; }
.export-area textarea {
  width: 100%; height: 120px; background: #0a1628; border: 1px solid #1a3a5c;
  color: #88ccaa; font-family: "SF Mono","Menlo",monospace; font-size: 11px;
  border-radius: 6px; padding: 8px; resize: none; outline: none;
}

/* Empty state */
.empty-state {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #334; font-size: 16px; text-align: center; pointer-events: none;
}

/* Status text */
.status-text { font-size: 11px; margin-top: 4px; }

/* Segment hover - via JS */
.seg-line.hover { stroke: #ff6b6b !important; opacity: 1 !important; stroke-width: 2.5 !important; }
.zs-rect.hover { fill: rgba(255,107,107,0.15) !important; stroke: #ff6b6b !important; }

/* Higher segment (red dashed) */
.higher-line { stroke: #ff6b6b !important; stroke-dasharray: 8,4; }

/* Segment zhongshu (blue transparent) */
.seg-zs-rect { fill: rgba(74,158,255,0.08); stroke: rgba(74,158,255,0.6); stroke-dasharray: 6,3; }
.seg-zs-line { stroke: rgba(74,158,255,0.6); stroke-dasharray: 4,2; }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Config -->
    <div class="panel">
      <div class="panel-title">参数配置</div>
      <div class="input-row">
        <span class="input-label">笔最小间距</span>
        <input type="number" id="minKlineGap" value="4" min="1" max="10" step="1" style="width:50px;flex:none;">
        <span class="input-label">根K线</span>
      </div>
      <div class="input-row">
        <span class="input-label">段最小幅度</span>
        <input type="number" id="minSegRatio" value="5" min="0" max="50" step="1" style="width:50px;flex:none;">
        <span class="input-label">% × 数据幅度</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="recomputeWithRatio()" style="width:100%">重新计算段+中枢</button>
      </div>
    </div>

    <!-- Stroke List -->
    <div class="panel" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="panel-title">转折点列表</div>
      <div class="stroke-list" id="strokeList"></div>
      <div class="btn-row">
        <button class="btn btn-danger" onclick="clearAll()">清空</button>
      </div>
    </div>

    <!-- 笔标注 -->
    <div class="panel">
      <div class="panel-title">笔标注</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoStrokeBtn" onclick="autoDetectStrokes()" disabled>自动画笔</button>
        <button class="btn btn-warn" id="drawStrokeBtn" onclick="toggleDrawStroke()">手动画笔</button>
        <button class="btn btn-danger" id="undoStrokeBtn" onclick="undoStrokeDraw()" disabled>撤销</button>
      </div>
    </div>

    <!-- Draw Segment -->
    <div class="panel">
      <div class="panel-title">段标注</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoSegBtn" onclick="autoDetectSegments()" disabled>自动画段</button>
        <button class="btn btn-warn" id="drawBtn" onclick="toggleDraw()" disabled>手动画段</button>
        <button class="btn btn-danger" id="undoSegBtn" onclick="undoSegment()" disabled>撤销</button>
      </div>
      <div class="seg-list" id="segList"></div>
    </div>

    <!-- 中枢 (Zhongshu) -->
    <div class="panel">
      <div class="panel-title">笔中枢</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoZsBtn" onclick="autoDetectZhongshu()" disabled>自动画中枢</button>
        <button class="btn btn-warn" id="drawZsBtn" onclick="toggleDrawZhongshu()" disabled>手动画中枢</button>
        <button class="btn btn-danger" id="undoZsBtn" onclick="undoZhongshu()" disabled>撤销</button>
      </div>
      <div class="zs-list" id="zsList"></div>
    </div>

    <!-- 段中枢 -->
    <div class="panel">
      <div class="panel-title">段中枢 <button class="btn-toggle on" id="segZsToggle" onclick="toggleSegZs()">ON</button></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoSegZsBtn" onclick="autoDetectSegmentZhongshu()" disabled>自动画</button>
        <button class="btn btn-warn" id="drawSegZsBtn" onclick="toggleDrawSegZs()" disabled>手动画</button>
        <button class="btn btn-danger" id="undoSegZsBtn" onclick="undoSegZs()" disabled>撤销</button>
      </div>
      <div class="zs-list" id="segZsList"></div>
    </div>

    <!-- 段的段 -->
    <div class="panel">
      <div class="panel-title">段的段</div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoHigherBtn" onclick="autoDetectHigherSegments()" disabled>自动画</button>
        <button class="btn btn-warn" id="drawHigherBtn" onclick="toggleDrawHigher()" disabled>手动画</button>
        <button class="btn btn-danger" id="undoHigherBtn" onclick="undoHigher()" disabled>撤销</button>
      </div>
      <div class="seg-list" id="higherList"></div>
    </div>

    <!-- Buy/Sell Points -->
    <div class="panel">
      <div class="panel-title">买卖点 <button class="btn-toggle on" id="bsToggle" onclick="toggleBuySell()">ON</button></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="autoBuySellBtn" onclick="autoDetectBuySell()" disabled>自动检测</button>
      </div>
      <div class="bs-list" id="bsList"></div>
    </div>

    <!-- Export -->
    <div class="panel">
      <div class="btn-row">
        <button class="btn btn-primary" onclick="exportJSON()" style="width:100%">导出标注 JSON</button>
      </div>
      <div class="export-area" id="exportArea" style="display:none; padding: 0; margin-top: 8px;">
        <textarea id="exportText" readonly></textarea>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div class="main">
    <!-- Top bar: Binance K线 controls -->
    <div class="topbar">
      <div class="tb-group">
        <input type="text" id="binanceSymbol" value="BTCUSDT" placeholder="交易对">
      </div>
      <div class="tb-group">
        <select id="binanceInterval">
          <option value="5m">5m</option>
          <option value="15m">15m</option>
          <option value="30m">30m</option>
          <option value="1h">1h</option>
          <option value="4h" selected>4h</option>
          <option value="1d">1d</option>
        </select>
        <input type="number" id="binanceCount" value="200" min="10" max="1000">
      </div>
      <button class="btn btn-success" onclick="loadBinanceKlines()">加载K线</button>
      <div class="tb-divider"></div>
      <button class="btn-toggle on" id="klineToggle" onclick="toggleKlines()">K线</button>
      <div class="tb-divider"></div>
      <span class="tb-status" id="binanceStatus"></span>
    </div>

    <!-- Chart -->
    <div class="chart-area">
      <div class="draw-hint" id="drawHint">画段模式：点击起点 → 点击终点</div>
      <div class="empty-state" id="emptyState">加载K线开始</div>
      <svg id="chart"></svg>
    </div>
  </div>
</div>

<script>
// ====== State ======
let strokes = [];
let deletedTurningPoints = new Set();  // indices of deleted turning points (hidden, gap preserved)
let turningPoints = [];
let segments = [];
let drawingMode = false;
let drawStart = null;
let chartCoords = [];
let chartLayout = null;
let zhongshuList = [];
let drawZsMode = false;
let zsDrawStart = null;
let isDraggingZs = false;
let zsDragIdx = -1;
let zsDragEdge = null;
let isDragging = false;
let dragIdx = -1;
let currentKlines = null;
let currentSymbol = null;
let currentInterval = null;
let currentFractals = null;
let segmentZhongshu = [];
let higherSegments = [];
let buySellPoints = [];
let divergencePoints = [];
let showSegZs = true;
let showBuySell = true;
let showKlines = true;
let drawSegZsMode = false;
let segZsDrawStart = null;
let drawHigherMode = false;
let higherDrawStart = null;
let drawStrokeMode = false;
let strokeDrawLastIdx = null;
let klineViewStart = 0;
let klineViewEnd = 0;
let isPanning = false;
let panStartX = 0;
let panViewStart = 0;
let panViewEnd = 0;

// ====== UI Helpers ======
function resetUIState() {
  segments = [];
  deletedTurningPoints = new Set();
  zhongshuList = [];
  segmentZhongshu = [];
  higherSegments = [];
  buySellPoints = [];
  divergencePoints = [];
  klineViewStart = 0;
  klineViewEnd = 0;
  drawStart = null;
  zsDrawStart = null;
  segZsDrawStart = null;
  higherDrawStart = null;
  strokeDrawLastIdx = null;
  drawingMode = false;
  drawZsMode = false;
  drawSegZsMode = false;
  drawHigherMode = false;
  drawStrokeMode = false;
  document.getElementById('drawHint').style.display = 'none';
  document.getElementById('drawBtn').textContent = '手动画段';
  document.getElementById('drawZsBtn').textContent = '手动画中枢';
  document.getElementById('drawSegZsBtn').textContent = '手动画';
  document.getElementById('drawHigherBtn').textContent = '手动画';
  document.getElementById('drawStrokeBtn').textContent = '手动画笔';
  document.getElementById('emptyState').style.display = 'none';
  // Conditionally enable based on turning point count (set later by caller)
  const tpReady = turningPoints.length >= 2;
  const segReady = turningPoints.length >= 8;
  const segDrawReady = turningPoints.length >= 4;
  document.getElementById('drawBtn').disabled = !tpReady;
  document.getElementById('autoSegBtn').disabled = !segReady;
  document.getElementById('autoZsBtn').disabled = !segReady;
  document.getElementById('drawZsBtn').disabled = !tpReady;
  document.getElementById('autoBuySellBtn').disabled = !segReady;
  document.getElementById('autoSegZsBtn').disabled = !segReady;
  document.getElementById('drawSegZsBtn').disabled = !segReady;
  document.getElementById('autoHigherBtn').disabled = !segReady;
  document.getElementById('drawHigherBtn').disabled = !segReady;
  document.getElementById('undoZsBtn').disabled = true;
  document.getElementById('undoSegBtn').disabled = true;
  document.getElementById('undoSegZsBtn').disabled = true;
  document.getElementById('undoHigherBtn').disabled = true;
  document.getElementById('undoStrokeBtn').disabled = true;
  document.getElementById('autoStrokeBtn').disabled = !currentKlines;
}

function getMinSegmentRatio() {
  return (parseFloat(document.getElementById('minSegRatio').value) || 0) / 100;
}

function getMinKlineGap() {
  return parseInt(document.getElementById('minKlineGap').value) || 4;
}

// ====== API Calls ======
async function loadBinanceKlines() {
  const symbol = document.getElementById('binanceSymbol').value.trim().toUpperCase();
  const interval = document.getElementById('binanceInterval').value;
  const limit = parseInt(document.getElementById('binanceCount').value) || 200;
  if (!symbol) { alert('请输入交易对'); return; }

  const statusEl = document.getElementById('binanceStatus');
  statusEl.textContent = '加载中...';
  statusEl.style.color = '#ffc832';

  try {
    const resp = await fetch('/api/compute/all', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({symbol, interval, limit, minSegmentRatio: getMinSegmentRatio(), minKlineGap: getMinKlineGap()})
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '未知错误');

    currentKlines = data.klines;
    currentSymbol = data.symbol;
    currentInterval = data.interval;
    currentFractals = data.fractals || [];

    // Reset UI state first, then set data
    resetUIState();
    turningPoints = data.turningPoints;
    strokes = data.strokes;
    // Segments/zhongshu/buy-sell left empty — user adds via sidebar buttons

    renderStrokeList();
    drawChart();

    statusEl.textContent = `${symbol} ${interval} · ${data.klines.length} K线 · ${data.turningPoints.length} 转折点`;
    statusEl.style.color = '#51cf66';
    if (data.warning) {
      statusEl.textContent += ' ⚠ ' + data.warning;
      statusEl.style.color = '#ffc832';
    }
  } catch (err) {
    statusEl.textContent = '错误: ' + err.message;
    statusEl.style.color = '#ff6b6b';
  }
}

async function autoDetectStrokes() {
  if (!currentKlines) { alert('请先加载K线数据'); return; }
  const statusEl = document.getElementById('binanceStatus');
  try {
    statusEl.textContent = '计算笔...';
    statusEl.style.color = '#ffc832';
    const resp = await fetch('/api/compute/strokes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ klines: currentKlines, minKlineGap: getMinKlineGap() })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '未知错误');

    resetUIState();
    currentFractals = data.fractals || [];
    turningPoints = data.turningPoints;
    strokes = data.strokes;

    renderStrokeList();
    drawChart();
    document.getElementById('undoStrokeBtn').disabled = turningPoints.length === 0;

    statusEl.textContent = `${currentSymbol} ${currentInterval} · ${currentKlines.length} K线 · ${turningPoints.length} 笔`;
    statusEl.style.color = '#51cf66';

    document.getElementById('autoSegBtn').disabled = turningPoints.length < 8;
    document.getElementById('drawBtn').disabled = turningPoints.length < 2;
    document.getElementById('autoZsBtn').disabled = turningPoints.length < 4;
    document.getElementById('drawZsBtn').disabled = turningPoints.length < 2;
  } catch (err) {
    statusEl.textContent = '计算笔失败: ' + err.message;
    statusEl.style.color = '#ff6b6b';
  }
}

async function autoDetectSegments() {
  if (turningPoints.length < 8) { alert('至少需要8个转折点才能自动画段（当前' + turningPoints.length + '个）'); return; }
  try {
    const resp = await fetch('/api/compute/segments', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({turningPoints, minSegmentRatio: getMinSegmentRatio()})
    });
    const data = await resp.json();
    segments = data.segments;
    redrawSegments();
    renderSegList();
    document.getElementById('undoSegBtn').disabled = false;
    document.getElementById('autoSegZsBtn').disabled = segments.length < 3;
    document.getElementById('drawSegZsBtn').disabled = segments.length < 3;
    document.getElementById('autoHigherBtn').disabled = segments.length < 4;
    document.getElementById('drawHigherBtn').disabled = segments.length < 3;
  } catch (err) {
    alert('计算失败: ' + err.message);
  }
}

async function autoDetectZhongshu() {
  if (turningPoints.length < 4) { alert('至少需要4个点'); return; }
  try {
    const resp = await fetch('/api/compute/zhongshu', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({turningPoints, minSegmentRatio: getMinSegmentRatio()})
    });
    const data = await resp.json();
    zhongshuList = data.zhongshu;
    drawChart();
    renderZhongshuList();
    document.getElementById('undoZsBtn').disabled = zhongshuList.length === 0;
    document.getElementById('autoBuySellBtn').disabled = zhongshuList.length === 0;
  } catch (err) {
    alert('计算失败: ' + err.message);
  }
}

async function recomputeWithRatio() {
  if (turningPoints.length < 4) { alert('至少需要4个点'); return; }
  try {
    const ratio = getMinSegmentRatio();
    const segResp = await fetch('/api/compute/segments', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({turningPoints, minSegmentRatio: ratio})
    });
    const segData = await segResp.json();
    segments = segData.segments;

    const zsResp = await fetch('/api/compute/zhongshu', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({turningPoints, minSegmentRatio: ratio})
    });
    const zsData = await zsResp.json();
    zhongshuList = zsData.zhongshu;

    // Also recompute segment level
    await recomputeSegmentLevel();

    // Recompute buy/sell points
    await recomputeBuySell();

    drawChart();
    renderSegList();
    renderZhongshuList();
    renderSegZsList();
    renderHigherList();
    renderBsList();
    document.getElementById('undoSegBtn').disabled = segments.length === 0;
    document.getElementById('undoZsBtn').disabled = zhongshuList.length === 0;
    document.getElementById('autoSegZsBtn').disabled = segments.length < 3;
    document.getElementById('drawSegZsBtn').disabled = segments.length < 3;
    document.getElementById('undoSegZsBtn').disabled = segmentZhongshu.length === 0;
    document.getElementById('autoHigherBtn').disabled = segments.length < 4;
    document.getElementById('drawHigherBtn').disabled = segments.length < 3;
    document.getElementById('undoHigherBtn').disabled = higherSegments.length === 0;

function drawBuySellMarkers() {
  if (!chartLayout || chartCoords.length === 0 || !buySellPoints.length) return;

  // Build divergence lookup by idx
  const divByIdx = {};
  divergencePoints.forEach(d => { divByIdx[d.idx] = d; });

  // Group by idx — one marker per turning point, show all labels
  const grouped = {};
  buySellPoints.forEach(p => {
    if (!grouped[p.idx]) grouped[p.idx] = [];
    grouped[p.idx].push(p);
  });

  Object.entries(grouped).forEach(([idx, points]) => {
    const i = parseInt(idx);
    const coord = chartCoords[i];
    if (!coord) return;

    const x = coord.x, y = coord.y;

    // Determine combined label text
    const buyLabels = points.filter(p => p.type === 'buy').map(p => p.label).sort().join('');
    const sellLabels = points.filter(p => p.type === 'sell').map(p => p.label).sort().map(l => l + "'").join('');
    const hasDiv = divByIdx[i];

    // Draw sell markers (red, above the point)
    if (sellLabels) {
      const r = 10;
      chart.appendChild(svgEl("circle", {
        cx: x, cy: y - r - 4, r, fill: "#ff1744", opacity: 0.92, class: "bs-marker"
      }));
      const lbl = svgEl("text", {
        x, y: y - r - 4 + 4, fill: "#fff", "font-size": 12, "font-weight": "bold",
        "text-anchor": "middle", "dominant-baseline": "middle", class: "bs-marker"
      });
      lbl.textContent = sellLabels;
      chart.appendChild(lbl);
    }

    // Draw buy markers (green, below the point)
    if (buyLabels) {
      const r = 10;
      chart.appendChild(svgEl("circle", {
        cx: x, cy: y + r + 4, r, fill: "#00c853", opacity: 0.92, class: "bs-marker"
      }));
      const lbl = svgEl("text", {
        x, y: y + r + 4 + 4, fill: "#fff", "font-size": 12, "font-weight": "bold",
        "text-anchor": "middle", "dominant-baseline": "middle", class: "bs-marker"
      });
      lbl.textContent = buyLabels;
      chart.appendChild(lbl);
    }

    // 背驰 indicator
    if (hasDiv) {
      const isTop = hasDiv.type === 'top';
      const tagY = isTop ? y - 28 : y + 30;
      chart.appendChild(svgEl("rect", {
        x: x + 10, y: tagY - 8, width: 20, height: 16, rx: 3,
        fill: isTop ? "rgba(255,23,68,0.85)" : "rgba(0,200,83,0.85)", class: "bs-marker"
      }));
      const divLbl = svgEl("text", {
        x: x + 20, y: tagY + 3, fill: "#fff", "font-size": 10, "font-weight": "bold",
        "text-anchor": "middle", "dominant-baseline": "middle", class: "bs-marker"
      });
      divLbl.textContent = "背";
      chart.appendChild(divLbl);
    }
  });
}

// ====== SVG Drawing ======
const SVG_NS = "http://www.w3.org/2000/svg";
const chart = document.getElementById('chart');

function svgEl(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

// ====== MACD Computation ======
function ema(data, period) {
  const k = 2 / (period + 1);
  const result = [data[0]];
  for (let i = 1; i < data.length; i++) {
    result.push(data[i] * k + result[i - 1] * (1 - k));
  }
  return result;
}

function computeMACD(closes, fast, slow, sig) {
  fast = fast || 12; slow = slow || 26; sig = sig || 9;
  const emaFast = ema(closes, fast);
  const emaSlow = ema(closes, slow);
  const dif = emaFast.map((v, i) => v - emaSlow[i]);
  const dea = ema(dif, sig);
  const histogram = dif.map((v, i) => (v - dea[i]) * 2);
  return { dif, dea, histogram };
}

// ====== 缠论背驰检测 ======
function detectDivergences() {
  if (!currentKlines || !currentFractals || !buySellPoints.length) { divergencePoints = []; return; }

  const closes = currentKlines.map(k => k.close);
  const { dif, dea, histogram } = computeMACD(closes);
  const tpKlineIdx = currentFractals.map(f => f.klineIdx);

  // Collect peaks and valleys from turningPoints
  const peaks = [], valleys = [];
  for (let i = 1; i < turningPoints.length - 1; i++) {
    if (turningPoints[i] > turningPoints[i - 1] && turningPoints[i] > turningPoints[i + 1]) peaks.push(i);
    if (turningPoints[i] < turningPoints[i - 1] && turningPoints[i] < turningPoints[i + 1]) valleys.push(i);
  }

  // Sum histogram area between two kline indices (inclusive)
  function histArea(klA, klB) {
    const s = Math.min(klA, klB), e = Math.max(klA, klB);
    let sum = 0;
    for (let i = s; i <= e; i++) sum += histogram[i];
    return sum;
  }

  function prevPeakBefore(idx) {
    for (let i = peaks.length - 1; i >= 0; i--) if (peaks[i] < idx) return peaks[i];
    return null;
  }
  function prevValleyBefore(idx) {
    for (let i = valleys.length - 1; i >= 0; i--) if (valleys[i] < idx) return valleys[i];
    return null;
  }

  const results = [];

  buySellPoints.forEach(point => {
    const i = point.idx;
    if (tpKlineIdx[i] === undefined) return;

    if (point.type === 'buy') {
      // 底背驰: find previous valley j where price[j] > price[i] (current makes new low)
      // and MACD histogram area of the down-section to i is smaller than to j
      for (let vi = valleys.length - 1; vi >= 0; vi--) {
        const j = valleys[vi];
        if (j >= i) continue;
        if (turningPoints[j] <= turningPoints[i]) continue; // need higher previous valley
        if (tpKlineIdx[j] === undefined) continue;
        // Compare histogram areas of the two down-sections
        const peakBeforeI = prevPeakBefore(i);
        const peakBeforeJ = prevPeakBefore(j);
        const klStartI = peakBeforeI !== null ? tpKlineIdx[peakBeforeI] : 0;
        const klStartJ = peakBeforeJ !== null ? tpKlineIdx[peakBeforeJ] : 0;
        const areaI = Math.abs(histArea(klStartI, tpKlineIdx[i]));
        const areaJ = Math.abs(histArea(klStartJ, tpKlineIdx[j]));
        if (areaI < areaJ) {
          results.push({
            type: 'bottom', // 底背驰
            idx: i,
            compareIdx: j,
            klineIdx: tpKlineIdx[i],
            compareKlineIdx: tpKlineIdx[j]
          });
        }
        break; // only check the most recent valid comparison valley
      }
    } else {
      // 顶背驰: find previous peak j where price[j] < price[i] (current makes new high)
      // and MACD histogram area of the up-section to i is smaller than to j
      for (let pi = peaks.length - 1; pi >= 0; pi--) {
        const j = peaks[pi];
        if (j >= i) continue;
        if (turningPoints[j] >= turningPoints[i]) continue; // need lower previous peak
        if (tpKlineIdx[j] === undefined) continue;
        const valleyBeforeI = prevValleyBefore(i);
        const valleyBeforeJ = prevValleyBefore(j);
        const klStartI = valleyBeforeI !== null ? tpKlineIdx[valleyBeforeI] : 0;
        const klStartJ = valleyBeforeJ !== null ? tpKlineIdx[valleyBeforeJ] : 0;
        const areaI = histArea(klStartI, tpKlineIdx[i]);
        const areaJ = histArea(klStartJ, tpKlineIdx[j]);
        if (areaI < areaJ) {
          results.push({
            type: 'top', // 顶背驰
            idx: i,
            compareIdx: j,
            klineIdx: tpKlineIdx[i],
            compareKlineIdx: tpKlineIdx[j]
          });
        }
        break;
      }
    }
  });

  divergencePoints = results;
}

function clearSVG() {
  while (chart.firstChild) chart.removeChild(chart.firstChild);
  chartCoords = [];
}

function drawChart() {
  if (turningPoints.length < 2) return;
  clearSVG();
  const rect = chart.parentElement.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  chart.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const klineMode = !!currentKlines && currentKlines.length > 0;
  const left = 80, right = 60, top = 30;

  // Split into price area + MACD area
  const macdH = klineMode ? Math.max(100, H * 0.22) : 0;
  const macdGap = klineMode ? 20 : 0;  // gap between panels
  const priceH = H - top - 30 - macdH - macdGap;
  const macdTop = top + priceH + macdGap;
  const cW = W - left - right;

  // === Price range ===
  let minP, maxP;
  let visStart = 0, visEnd = 0, visibleKlines = currentKlines;
  if (klineMode) {
    const totalKlines = currentKlines.length;
    if (klineViewEnd > klineViewStart) {
      visStart = Math.max(0, Math.floor(klineViewStart));
      visEnd = Math.min(totalKlines, Math.ceil(klineViewEnd));
    } else {
      visStart = 0;
      visEnd = totalKlines;
    }
    visibleKlines = currentKlines.slice(visStart, visEnd);
    if (showKlines) {
      minP = Math.min(...visibleKlines.map(k => k.low), ...turningPoints);
      maxP = Math.max(...visibleKlines.map(k => k.high), ...turningPoints);
    } else {
      minP = Math.min(...turningPoints);
      maxP = Math.max(...turningPoints);
    }
  } else {
    minP = Math.min(...turningPoints);
    maxP = Math.max(...turningPoints);
  }
  const padding = (maxP - minP) * 0.06 || 5;
  const rangeMin = minP - padding;
  const rangeMax = maxP + padding;
  const range = rangeMax - rangeMin;
  const yScale = priceH / range;
  const toY = p => top + priceH - (p - rangeMin) * yScale;

  // === X-axis ===
  let toX, tpKlineIdx = null, klineBarW = 0, timeMin = 0, timeRange = 1;
  if (klineMode) {
    timeMin = visibleKlines[0].openTime;
    const timeMax = visibleKlines[visibleKlines.length - 1].closeTime;
    timeRange = timeMax - timeMin || 1;
    const timeToX = t => left + (t - timeMin) / timeRange * cW;
    // Build tpKlineIdx: map turning point index -> kline index
    tpKlineIdx = currentFractals ? currentFractals.map(f => f.klineIdx) : [];
    toX = i => {
      if (tpKlineIdx && i < tpKlineIdx.length && tpKlineIdx[i] < currentKlines.length) {
        return timeToX(currentKlines[tpKlineIdx[i]].openTime);
      }
      return left + i * (cW / Math.max(turningPoints.length - 1, 1));
    };
    // Bar width from typical kline interval
    const interval = currentKlines.length > 1 ? currentKlines[1].openTime - currentKlines[0].openTime : 60000;
    klineBarW = Math.max(1, (interval / timeRange) * cW * 0.8);
  } else {
    const gap = cW / (turningPoints.length - 1);
    toX = i => left + i * gap;
  }

  // Store layout for other functions
  chartLayout = {
    top, left, right, cW,
    priceH, priceBottom: top + priceH,
    macdTop, macdH, macdBottom: macdTop + macdH,
    minP: rangeMin, maxP: rangeMax, yScale,
    klineMode, W, H,
    timeMin, timeRange, klineBarW, tpKlineIdx,
    visStart, visEnd, totalKlines: currentKlines ? currentKlines.length : 0
  };
  chartCoords = turningPoints.map((p, i) => ({ x: toX(i), y: toY(p), price: p }));

  // === Price grid ===
  const dataRange = maxP - minP;
  const rawStep = dataRange / 8;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  let step;
  if (rawStep / mag < 2) step = 2 * mag;
  else if (rawStep / mag < 5) step = 5 * mag;
  else step = 10 * mag;
  const gridStart = Math.floor(rangeMin / step) * step;
  for (let p = gridStart; p <= rangeMax; p += step) {
    const y = toY(p);
    chart.appendChild(svgEl("line", { x1: left - 5, y1: y, x2: left + cW + 5, y2: y, stroke: "#1e3050", "stroke-width": 0.5, "stroke-dasharray": "3,3" }));
    const lbl = svgEl("text", { x: left - 10, y: y + 4, fill: "#5577aa", "font-size": 11, "text-anchor": "end", "font-family": "SF Mono,Menlo,monospace" });
    lbl.textContent = Math.round(p * 100) / 100;
    chart.appendChild(lbl);
  }

  // === K-line candlesticks ===
  if (klineMode && showKlines) {
    const timeToX = t => left + (t - timeMin) / timeRange * cW;
    visibleKlines.forEach((k, idx) => {
      const cx = timeToX(k.openTime);
      const yH = toY(k.high), yL = toY(k.low);
      const yO = toY(k.open), yC = toY(k.close);
      const bull = k.close >= k.open;
      const color = bull ? "#26a69a" : "#ef5350";
      const bodyTop = Math.min(yO, yC), bodyH = Math.max(Math.abs(yO - yC), 1);
      // Wick
      chart.appendChild(svgEl("line", { x1: cx, y1: yH, x2: cx, y2: yL, stroke: color, "stroke-width": 1 }));
      // Body
      chart.appendChild(svgEl("rect", {
        x: cx - klineBarW / 2, y: bodyTop, width: klineBarW, height: bodyH,
        fill: bull ? color : color, stroke: color, "stroke-width": 0.5, opacity: 0.9
      }));
    });
  }

  // === MACD panel ===
  if (klineMode) {
    drawMACDPanel(macdTop, macdH, left, cW);
  }

  // === Overlays ===
  // 中枢 rectangles (behind segments)
  drawZhongshuRectangles();
  if (showSegZs) drawSegmentZhongshuRects();

  // Segments
  segments.forEach((seg, i) => drawSegmentLine(seg.fromIdx, seg.toIdx, i));

  // Zigzag strokes — draw only strokes that exist in the strokes array
  if (strokes.length >= 1) {
    const strokeColor = klineMode ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.85)";
    const strokeWidth = klineMode ? 1 : 0.8;
    strokes.forEach((s, si) => {
      if (s.fromIdx === null || s.fromIdx === undefined) return;
      const x1 = toX(s.fromIdx), y1 = toY(turningPoints[s.fromIdx]);
      const x2 = toX(s.toIdx), y2 = toY(turningPoints[s.toIdx]);
      const hidden = deletedTurningPoints.has(s.fromIdx) || deletedTurningPoints.has(s.toIdx);
      if (!hidden) {
        chart.appendChild(svgEl("line", {
          x1, y1, x2, y2,
          stroke: strokeColor, "stroke-width": strokeWidth,
          "stroke-linecap": "round"
        }));
      }
      // Hit area always present
      chart.appendChild(svgEl("line", {
        x1, y1, x2, y2,
        stroke: "transparent", "stroke-width": 14,
        class: "stroke-hit", "data-stroke-idx": s.toIdx,
        style: hidden ? "cursor:default" : "cursor:pointer"
      }));
    });
  }
  // Turning point dots — skip deleted
  turningPoints.forEach((p, i) => {
    if (deletedTurningPoints.has(i)) return;
    const x = toX(i), y = toY(p);

    // Visual dots — always show
    if (klineMode) {
      // Kline mode: colored dots — green for bottom, red for top
      const isTop = i > 0 && i < turningPoints.length - 1 && turningPoints[i] > turningPoints[i-1] && turningPoints[i] > turningPoints[i+1];
      const isBottom = i > 0 && i < turningPoints.length - 1 && turningPoints[i] < turningPoints[i-1] && turningPoints[i] < turningPoints[i+1];
      const dotColor = isTop ? "#ff6b6b" : isBottom ? "#51cf66" : "#00e5ff";
      chart.appendChild(svgEl("circle", { cx: x, cy: y, r: 5, fill: dotColor, stroke: "#fff", "stroke-width": 1, class: "tp-dot", "data-idx": i, style: "cursor:pointer" }));
      // Price label
      const ly = isTop ? y - 10 : isBottom ? y + 16 : y - 10;
      const lbl = svgEl("text", { x, y: ly, fill: dotColor, "font-size": 10, "text-anchor": "middle", "font-family": "SF Mono,Menlo,monospace", class: "tp-label", "data-idx": i });
      lbl.textContent = Math.round(p * 100) / 100;
      chart.appendChild(lbl);
    } else {
      chart.appendChild(svgEl("circle", { cx: x, cy: y, r: 7, fill: "none", stroke: "rgba(255,255,255,0.2)", "stroke-width": 1, opacity: 0.25 }));
      chart.appendChild(svgEl("circle", { cx: x, cy: y, r: 5, fill: "#16213e", stroke: "rgba(255,255,255,0.85)", "stroke-width": 1.5, class: "tp-dot", "data-idx": i, style: "cursor:grab" }));
      const isPeak = i > 0 && i < turningPoints.length - 1 && turningPoints[i] > turningPoints[i-1] && turningPoints[i] > turningPoints[i+1];
      const isValley = i > 0 && i < turningPoints.length - 1 && turningPoints[i] < turningPoints[i-1] && turningPoints[i] < turningPoints[i+1];
      let ly = isPeak ? y - 14 : isValley ? y + 20 : (i === 0 ? y - 14 : y + 20);
      const lbl = svgEl("text", { x, y: ly, fill: "#99aabb", "font-size": 12, "text-anchor": "middle", "font-family": "SF Mono,Menlo,monospace", class: "tp-label", "data-idx": i });
      lbl.textContent = Math.round(p * 100) / 100;
      chart.appendChild(lbl);
    }

    // Hit area for click interaction — always render
    const hitCursor = klineMode ? "pointer" : "grab";
    const hitCircle = svgEl("circle", { cx: x, cy: y, r: klineMode ? 10 : 18, fill: "transparent", stroke: "none", class: "tp-hit", "data-idx": i, style: `cursor:${hitCursor}` });
    const tipEl = svgEl("title", {});
    tipEl.textContent = Math.round(p * 100) / 100;
    hitCircle.appendChild(tipEl);
    chart.appendChild(hitCircle);
  });

  // Buy/sell markers
  if (showBuySell) drawBuySellMarkers();

  // Higher-level segments (red dashed)
  drawHigherSegmentLines();

  // Time labels (kline mode)
  if (klineMode) {
    const timeToX = t => left + (t - timeMin) / timeRange * cW;
    const labelY = H - 8;
    const step2 = Math.max(1, Math.floor(visibleKlines.length / 10));
    for (let vi = 0; vi < visibleKlines.length; vi += step2) {
      const k = visibleKlines[vi];
      const x = timeToX(k.openTime);
      const dt = new Date(k.openTime);
      const txt = currentInterval && (currentInterval.includes('d') || currentInterval === '1w' || currentInterval === '1M')
        ? `${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')}`
        : `${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
      const lbl = svgEl("text", { x, y: labelY, fill: "#5577aa", "font-size": 10, "text-anchor": "middle", "font-family": "SF Mono,Menlo,monospace" });
      lbl.textContent = txt;
      chart.appendChild(lbl);
    }
  }

  if (klineMode) initCrosshair();
}

function drawMACDPanel(macdTop, macdH, left, cW) {
  // Compute MACD from ALL klines (for correct EMA), but only render visible slice
  const allCloses = currentKlines.map(k => k.close);
  const { dif, dea, histogram } = computeMACD(allCloses);

  const visStart = chartLayout.visStart;
  const visEnd = chartLayout.visEnd;

  // Visible slice of MACD data
  const visDif = dif.slice(visStart, visEnd);
  const visDea = dea.slice(visStart, visEnd);
  const visHist = histogram.slice(visStart, visEnd);

  // Panel background
  chart.appendChild(svgEl("rect", { x: left, y: macdTop, width: cW, height: macdH, fill: "rgba(10,20,40,0.5)", stroke: "#1e3050", "stroke-width": 0.5, rx: 3 }));

  // Label
  const label = svgEl("text", { x: left + 6, y: macdTop + 14, fill: "#5577aa", "font-size": 10, "font-family": "SF Mono,Menlo,monospace" });
  label.textContent = "MACD (12,26,9)";
  chart.appendChild(label);

  // MACD Y scale (from visible data only)
  const maxAbs = Math.max(0.001, Math.max(...visHist.map(Math.abs)), Math.max(...visDif.map(Math.abs)), Math.max(...visDea.map(Math.abs)));
  const macdYScale = (macdH - 24) / (2 * maxAbs);
  const zeroY = macdTop + macdH / 2;
  const toMY = v => zeroY - v * macdYScale;

  // Zero line
  chart.appendChild(svgEl("line", { x1: left, y1: zeroY, x2: left + cW, y2: zeroY, stroke: "#334466", "stroke-width": 0.5, "stroke-dasharray": "4,3" }));

  // Time-to-X helper
  const timeToX = t => left + (t - chartLayout.timeMin) / chartLayout.timeRange * cW;
  const barW = Math.max(1, chartLayout.klineBarW * 0.6);

  // Histogram bars (visible only)
  visHist.forEach((v, vi) => {
    const kIdx = visStart + vi;
    const x = timeToX(currentKlines[kIdx].openTime);
    const y = toMY(v);
    const h = Math.abs(y - zeroY);
    const prevV = vi > 0 ? visHist[vi - 1] : v;
    const color = v >= 0 ? (vi > 0 && v < prevV ? "#66bb6a" : "#26a69a") : (vi > 0 && v > prevV ? "#ef9a9a" : "#ef5350");
    chart.appendChild(svgEl("rect", {
      x: x - barW / 2, y: Math.min(y, zeroY), width: barW, height: Math.max(h, 0.5),
      fill: color, opacity: 0.8
    }));
  });

  // DIF line (visible only)
  let dDif = "";
  visDif.forEach((v, vi) => {
    const kIdx = visStart + vi;
    const x = timeToX(currentKlines[kIdx].openTime);
    const y = toMY(v);
    dDif += (vi === 0 ? "M" : "L") + ` ${x} ${y}`;
  });
  if (dDif) chart.appendChild(svgEl("path", { d: dDif, fill: "none", stroke: "#2196f3", "stroke-width": 1.2 }));

  // DEA line (visible only)
  let dDea = "";
  visDea.forEach((v, vi) => {
    const kIdx = visStart + vi;
    const x = timeToX(currentKlines[kIdx].openTime);
    const y = toMY(v);
    dDea += (vi === 0 ? "M" : "L") + ` ${x} ${y}`;
  });
  if (dDea) chart.appendChild(svgEl("path", { d: dDea, fill: "none", stroke: "#ff9800", "stroke-width": 1.2 }));

  // Divergence lines on MACD
  if (divergencePoints.length) {
    divergencePoints.forEach(div => {
      const kIdx1 = div.compareKlineIdx;
      const kIdx2 = div.klineIdx;
      // Only draw if both points are in visible range
      if (kIdx1 < visStart || kIdx1 >= visEnd || kIdx2 < visStart || kIdx2 >= visEnd) return;

      const x1 = timeToX(currentKlines[kIdx1].openTime);
      const y1 = toMY(dif[kIdx1]);
      const x2 = timeToX(currentKlines[kIdx2].openTime);
      const y2 = toMY(dif[kIdx2]);
      const isTop = div.type === 'top';
      const color = isTop ? "#ff1744" : "#00c853";

      // Divergence line on DIF
      chart.appendChild(svgEl("line", {
        x1, y1, x2, y2, stroke: color, "stroke-width": 1.5, opacity: 0.9, class: "div-line"
      }));
      // Dots at both ends
      chart.appendChild(svgEl("circle", { cx: x1, cy: y1, r: 3, fill: color, opacity: 0.9, class: "div-line" }));
      chart.appendChild(svgEl("circle", { cx: x2, cy: y2, r: 3, fill: color, opacity: 0.9, class: "div-line" }));
      // Label
      const midX = (x1 + x2) / 2, midY = (y1 + y2) / 2;
      const tag = isTop ? "顶背驰" : "底背驰";
      const bg = svgEl("rect", {
        x: midX - 22, y: midY - 16, width: 44, height: 16, rx: 3,
        fill: color, opacity: 0.85, class: "div-line"
      });
      chart.appendChild(bg);
      const txt = svgEl("text", {
        x: midX, y: midY - 6, fill: "#fff", "font-size": 10, "font-weight": "bold",
        "text-anchor": "middle", class: "div-line"
      });
      txt.textContent = tag;
      chart.appendChild(txt);
    });
  }

  // Separator line above MACD
  chart.appendChild(svgEl("line", { x1: left, y1: macdTop - 1, x2: left + cW, y2: macdTop - 1, stroke: "#2a3a5a", "stroke-width": 1 }));
}

function drawSegmentLine(fromIdx, toIdx, segIdx) {
  const from = chartCoords[fromIdx], to = chartCoords[toIdx];
  if (!from || !to) return;
  chart.appendChild(svgEl("line", {
    x1: from.x, y1: from.y, x2: to.x, y2: to.y,
    stroke: "transparent", "stroke-width": 12,
    "stroke-linecap": "round", class: "seg-hit", "data-seg-idx": segIdx, style: "cursor:pointer"
  }));
  chart.appendChild(svgEl("line", {
    x1: from.x, y1: from.y, x2: to.x, y2: to.y,
    stroke: "#4a9eff", "stroke-width": 1.5,
    "stroke-linecap": "round", opacity: 0.9, class: "seg-line", "data-seg-idx": segIdx
  }));
}

function redrawSegments() {
  chart.querySelectorAll(".seg-line,.seg-hit").forEach(el => el.remove());
  segments.forEach((seg, i) => drawSegmentLine(seg.fromIdx, seg.toIdx, i));
  bindSegHover();
}

function bindSegHover() {
  chart.querySelectorAll('.seg-hit').forEach(el => {
    el.addEventListener('mouseenter', function() {
      const idx = this.getAttribute('data-seg-idx');
      const line = chart.querySelector(`.seg-line[data-seg-idx="${idx}"]`);
      if (line) line.classList.add('hover');
    });
    el.addEventListener('mouseleave', function() {
      const idx = this.getAttribute('data-seg-idx');
      const line = chart.querySelector(`.seg-line[data-seg-idx="${idx}"]`);
      if (line) line.classList.remove('hover');
    });
  });
  chart.querySelectorAll('.zs-rect').forEach(el => {
    el.addEventListener('mouseenter', function() { this.classList.add('hover'); });
    el.addEventListener('mouseleave', function() { this.classList.remove('hover'); });
  });
}

function drawZhongshuRectangles() {
  if (!chartLayout || chartCoords.length === 0) return;
  zhongshuList.forEach((zs, i) => {
    const from = chartCoords[zs.fromIdx];
    const to = chartCoords[zs.toIdx];
    if (!from || !to) return;

    const zgY = chartLayout.priceBottom - (zs.zg - chartLayout.minP) * chartLayout.yScale;
    const zdY = chartLayout.priceBottom - (zs.zd - chartLayout.minP) * chartLayout.yScale;

    chart.appendChild(svgEl("rect", {
      x: from.x - 2, y: zgY, width: to.x - from.x + 4, height: zdY - zgY,
      fill: "rgba(255,255,255,0.12)", stroke: "rgba(255,255,255,0.6)", "stroke-width": 1,
      "stroke-dasharray": "6,3", rx: 3, class: "zs-rect", "data-zs-idx": i, style: "cursor:pointer"
    }));
    chart.appendChild(svgEl("line", { x1: from.x - 5, y1: zgY, x2: to.x + 5, y2: zgY, stroke: "rgba(255,255,255,0.6)", "stroke-width": 0.8, "stroke-dasharray": "4,2", class: "zs-line" }));
    chart.appendChild(svgEl("line", { x1: from.x - 5, y1: zdY, x2: to.x + 5, y2: zdY, stroke: "rgba(255,255,255,0.6)", "stroke-width": 0.8, "stroke-dasharray": "4,2", class: "zs-line" }));
  });
}

  drawingMode = !drawingMode;

    if (drawZsMode) toggleDrawZhongshu();

    if (drawHigherMode) toggleDrawHigher();
    if (drawStrokeMode) toggleDrawStroke();

}

function removeHigher(i) {
  higherSegments.splice(i, 1);
  drawChart();
  renderHigherList();
  document.getElementById('undoHigherBtn').disabled = higherSegments.length === 0;
}

function findSnapPoint(pt) {
  if (!currentKlines || !chartLayout) return null;
  const timeToX = t => chartLayout.left + (t - chartLayout.timeMin) / chartLayout.timeRange * chartLayout.cW;
  const visStart = chartLayout.visStart || 0;
  const visEnd = chartLayout.visEnd || currentKlines.length;
  let bestDist = Infinity, bestIdx = 0, useHigh = true;
  for (let ki = visStart; ki < visEnd; ki++) {
    const k = currentKlines[ki];
    const x = timeToX(k.openTime);
    const dx = Math.abs(pt.x - x);
    if (dx < bestDist) {
      bestDist = dx;
      bestIdx = ki;
      const toY = p => chartLayout.priceBottom - (p - chartLayout.minP) * chartLayout.yScale;
      const dyHigh = Math.abs(pt.y - toY(k.high));
      const dyLow = Math.abs(pt.y - toY(k.low));
      useHigh = dyHigh < dyLow;
    }
  }
  const k = currentKlines[bestIdx];
  const price = useHigh ? k.high : k.low;
  return { x: timeToX(k.openTime), y: chartLayout.priceBottom - (price - chartLayout.minP) * chartLayout.yScale, price, klineIdx: bestIdx, useHigh };
}

function toggleDrawStroke() {
  drawStrokeMode = !drawStrokeMode;
  strokeDrawLastIdx = null;
  const btn = document.getElementById('drawStrokeBtn');
  const hint = document.getElementById('drawHint');
  if (drawStrokeMode) {
    if (drawingMode) toggleDraw();
    if (drawZsMode) toggleDrawZhongshu();
    if (drawSegZsMode) toggleDrawSegZs();
    if (drawHigherMode) toggleDrawHigher();
    btn.textContent = '停止手动画';
    hint.textContent = '画笔模式：点击图表，吸附最近K线的顶或底';
    hint.style.display = 'block';
    hideCrosshair();
    chart.querySelectorAll('.snap-preview').forEach(el => el.remove());
    setSegHitEvents(false);
  } else {
    btn.textContent = '手动画笔';
    hint.style.display = 'none';
    chart.querySelectorAll('.tp-highlight, .snap-preview').forEach(el => el.remove());
    setSegHitEvents(true);
  }
}

function undoStrokeDraw() {
  if (turningPoints.length === 0) return;
  strokes.pop();
  turningPoints.pop();
  if (currentFractals && currentFractals.length > turningPoints.length) {
    currentFractals.pop();
  }
  segments = segments.filter(s => s.fromIdx < turningPoints.length && s.toIdx < turningPoints.length);
  zhongshuList = zhongshuList.filter(z => z.fromIdx < turningPoints.length && z.toIdx < turningPoints.length);
  segmentZhongshu = segmentZhongshu.filter(s => s.fromIdx < turningPoints.length && s.toIdx < turningPoints.length);
  higherSegments = higherSegments.filter(s => s.fromIdx < turningPoints.length && s.toIdx < turningPoints.length);
  document.getElementById('undoStrokeBtn').disabled = turningPoints.length === 0;
  renderStrokeList();
  drawChart();
}

chart.addEventListener('click', function(e) {
  if (isDragging || isDraggingZs || isPanning) return;
  const noDrawMode = !drawingMode && !drawZsMode && !drawSegZsMode && !drawHigherMode && !drawStrokeMode;

  // Click on stroke line to delete line + both endpoint turning points, no reconnection
  const strokeHit = e.target.closest('.stroke-hit');
  if (strokeHit && noDrawMode) {
    const idx = parseInt(strokeHit.getAttribute('data-stroke-idx'));
    if (!isNaN(idx) && idx > 0 && idx < turningPoints.length) {
      deletedTurningPoints.add(idx - 1);
      deletedTurningPoints.add(idx);
      drawChart();
    }
    return;
  }

  // Click on turning point to delete it (non-draw mode)
  const tpHit = e.target.closest('.tp-dot, .tp-hit');
  if (tpHit && noDrawMode) {
    const idx = parseInt(tpHit.getAttribute('data-idx'));
    if (!isNaN(idx) && idx < turningPoints.length) {
      removeStroke(idx);
    }
    return;
  }

  const segHit = e.target.closest('.seg-hit');
  if (segHit && noDrawMode) {
    const idx = parseInt(segHit.getAttribute('data-seg-idx'));
    if (!isNaN(idx) && idx < segments.length) {
      segments.splice(idx, 1);
      redrawSegments();
      document.getElementById('undoSegBtn').disabled = segments.length === 0;
    }
    return;
  }

  const zsRect = e.target.closest('.zs-rect');
  if (zsRect && noDrawMode) {
    const idx = parseInt(zsRect.getAttribute('data-zs-idx'));
    if (!isNaN(idx) && idx < zhongshuList.length) {
      zhongshuList.splice(idx, 1);
      drawChart();
      document.getElementById('undoZsBtn').disabled = zhongshuList.length === 0;
    }
    return;
  }

  const segZsRect = e.target.closest('.seg-zs-rect');
  if (segZsRect && noDrawMode) {
    const idx = parseInt(segZsRect.getAttribute('data-seg-zs-idx'));
    if (!isNaN(idx) && idx < segmentZhongshu.length) {
      segmentZhongshu.splice(idx, 1);
      drawChart();
      renderSegZsList();
      document.getElementById('undoSegZsBtn').disabled = segmentZhongshu.length === 0;
    }
    return;
  }

  const higherHit = e.target.closest('.higher-hit');
  if (higherHit && noDrawMode) {
    const idx = parseInt(higherHit.getAttribute('data-higher-idx'));
    if (!isNaN(idx) && idx < higherSegments.length) {
      higherSegments.splice(idx, 1);
      drawChart();
      renderHigherList();
      document.getElementById('undoHigherBtn').disabled = higherSegments.length === 0;
    }
    return;
  }

  // Manual stroke drawing — click on chart, snap to nearest kline high/low
  if (drawStrokeMode) {
    const pt = svgPoint(e);
    if (!pt || !chartLayout) return;
    if (pt.x < chartLayout.left || pt.x > chartLayout.left + chartLayout.cW) return;
    if (pt.y < chartLayout.top || pt.y > chartLayout.priceBottom) return;

    let price, snapKlineIdx = null;
    if (currentKlines) {
      const snap = findSnapPoint(pt);
      if (!snap) return;
      price = snap.price;
      snapKlineIdx = snap.klineIdx;
    } else {
      price = parseFloat(yToPrice(pt.y).toFixed(2));
    }

    let dir;
    const isManualFirst = strokeDrawLastIdx === null;
    if (isManualFirst) {
      dir = 'down';
    } else {
      const lastPrice = turningPoints[strokeDrawLastIdx];
      dir = price > lastPrice ? 'up' : 'down';
    }

    turningPoints.push(price);
    if (currentKlines && snapKlineIdx !== null && snapKlineIdx < currentKlines.length) {
      if (!currentFractals) currentFractals = [];
      currentFractals.push({ klineIdx: snapKlineIdx, type: dir === 'up' ? 'top' : 'bottom', price, time: currentKlines[snapKlineIdx].openTime });
    }
    if (!isManualFirst) {
      strokes.push({ dir, val: price, fromIdx: strokeDrawLastIdx, toIdx: turningPoints.length - 1 });
    }
    strokeDrawLastIdx = turningPoints.length - 1;
    document.getElementById('undoStrokeBtn').disabled = false;
    renderStrokeList();
    drawChart();
    return;
  }

  if (noDrawMode) return;
  const target = e.target.closest('[data-idx]');
  if (!target) return;
  const idx = parseInt(target.getAttribute('data-idx'));

  if (drawingMode) {
    if (drawStart === null) {
      drawStart = idx;
      const c = chartCoords[idx];
      chart.appendChild(svgEl("circle", { cx: c.x, cy: c.y, r: 14, fill: "none", stroke: "#ffc832", "stroke-width": 2, opacity: 0.6, class: "tp-highlight" }));
    } else {
      if (idx === drawStart) return;
      segments.push({ fromIdx: drawStart, toIdx: idx });
      drawStart = null;
      chart.querySelectorAll('.tp-highlight').forEach(el => el.remove());
      redrawSegments();
      document.getElementById('undoSegBtn').disabled = false;
    }
  } else if (drawZsMode) {
    if (zsDrawStart === null) {
      zsDrawStart = idx;
      const c = chartCoords[idx];
      chart.appendChild(svgEl("circle", { cx: c.x, cy: c.y, r: 14, fill: "none", stroke: "#ffc832", "stroke-width": 2, opacity: 0.6, class: "tp-highlight" }));
    } else {
      if (idx === zsDrawStart) return;
      const fromIdx = Math.min(zsDrawStart, idx);
      const toIdx = Math.max(zsDrawStart, idx);
      const tp = turningPoints;
      let minHigh = Infinity, maxLow = -Infinity;
      for (let i = fromIdx; i < toIdx; i++) {
        minHigh = Math.min(minHigh, Math.max(tp[i], tp[i+1]));
        maxLow = Math.max(maxLow, Math.min(tp[i], tp[i+1]));
      }
      if (minHigh > maxLow) {
        zhongshuList.push({fromIdx, toIdx, zg: minHigh, zd: maxLow});
        document.getElementById('undoZsBtn').disabled = false;
      }
      zsDrawStart = null;
      chart.querySelectorAll('.tp-highlight').forEach(el => el.remove());
      drawChart();
    }
  } else if (drawSegZsMode) {
    if (segZsDrawStart === null) {
      segZsDrawStart = idx;
      const c = chartCoords[idx];
      chart.appendChild(svgEl("circle", { cx: c.x, cy: c.y, r: 14, fill: "none", stroke: "#ffc832", "stroke-width": 2, opacity: 0.6, class: "tp-highlight" }));
    } else {
      if (idx === segZsDrawStart) return;
      const fromIdx = Math.min(segZsDrawStart, idx);
      const toIdx = Math.max(segZsDrawStart, idx);
      const inRangeSegs = segments.filter(s => s.fromIdx >= fromIdx && s.toIdx <= toIdx);
      if (inRangeSegs.length >= 3) {
        let minHigh = Infinity, maxLow = -Infinity;
        for (const seg of inRangeSegs) {
          const segHigh = Math.max(turningPoints[seg.fromIdx], turningPoints[seg.toIdx]);
          const segLow = Math.min(turningPoints[seg.fromIdx], turningPoints[seg.toIdx]);
          minHigh = Math.min(minHigh, segHigh);
          maxLow = Math.max(maxLow, segLow);
        }
        if (minHigh > maxLow) {
          segmentZhongshu.push({
            fromIdx: inRangeSegs[0].fromIdx,
            toIdx: inRangeSegs[inRangeSegs.length - 1].toIdx,
            zg: minHigh,
            zd: maxLow
          });
          document.getElementById('undoSegZsBtn').disabled = false;
        }
      }
      segZsDrawStart = null;
      chart.querySelectorAll('.tp-highlight').forEach(el => el.remove());
      drawChart();
      renderSegZsList();
    }
  } else if (drawHigherMode) {
    if (higherDrawStart === null) {
      higherDrawStart = idx;
      const c = chartCoords[idx];
      chart.appendChild(svgEl("circle", { cx: c.x, cy: c.y, r: 14, fill: "none", stroke: "#ffc832", "stroke-width": 2, opacity: 0.6, class: "tp-highlight" }));
    } else {
      if (idx === higherDrawStart) return;
      higherSegments.push({ fromIdx: higherDrawStart, toIdx: idx });
      higherDrawStart = null;
      chart.querySelectorAll('.tp-highlight').forEach(el => el.remove());
      drawChart();
      renderHigherList();
      document.getElementById('undoHigherBtn').disabled = false;
    }
  }
});

function undoSegment() {
  if (segments.length === 0) return;
  segments.pop();
  redrawSegments();
  renderSegList();
  document.getElementById('undoSegBtn').disabled = segments.length === 0;
}

function removeSegment(i) {
  segments.splice(i, 1);
  redrawSegments();
  renderSegList();
  document.getElementById('undoSegBtn').disabled = segments.length === 0;
}

function undoZhongshu() {
  if (zhongshuList.length === 0) return;
  zhongshuList.pop();
  drawChart();
  renderZhongshuList();
  document.getElementById('undoZsBtn').disabled = zhongshuList.length === 0;
}

function removeZhongshu(i) {
  zhongshuList.splice(i, 1);
  drawChart();
  renderZhongshuList();
  document.getElementById('undoZsBtn').disabled = zhongshuList.length === 0;
}

// ====== Drag ======
function svgPoint(evt) {
  const pt = chart.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const ctm = chart.getScreenCTM();
  if (!ctm) return null;
  return pt.matrixTransform(ctm.inverse());
}

function yToPrice(y) {
  if (!chartLayout) return 0;
  return chartLayout.minP + (chartLayout.priceBottom - y) / chartLayout.yScale;
}

chart.addEventListener('mousedown', function(e) {
  const tpTarget = e.target.closest('.tp-hit, .tp-dot');
  if (tpTarget && !drawingMode && !drawZsMode && !drawSegZsMode && !drawHigherMode && !currentKlines) {
    const idx = parseInt(tpTarget.getAttribute('data-idx'));
    if (isNaN(idx)) return;
    isDragging = true;
    dragIdx = idx;
    e.preventDefault();
    chart.querySelectorAll(`[data-idx="${idx}"].tp-dot`).forEach(d => { d.setAttribute('r', 7); d.setAttribute('fill', '#00d4ff'); d.style.cursor = 'grabbing'; });
    chart.querySelectorAll(`[data-idx="${idx}"].tp-hit`).forEach(h => h.style.cursor = 'grabbing');
    return;
  }

  const zsRect = e.target.closest('.zs-rect');
  if (zsRect && !drawingMode && !drawZsMode && !drawSegZsMode && !drawHigherMode && chartLayout) {
    const zsIdx = parseInt(zsRect.getAttribute('data-zs-idx'));
    if (!isNaN(zsIdx) && zsIdx < zhongshuList.length) {
      const pt = svgPoint(e);
      if (pt) {
        const zs = zhongshuList[zsIdx];
        const zgY = chartLayout.priceBottom - (zs.zg - chartLayout.minP) * chartLayout.yScale;
        const zdY = chartLayout.priceBottom - (zs.zd - chartLayout.minP) * chartLayout.yScale;
        if (Math.abs(pt.y - zgY) < 15) {
          isDraggingZs = true; zsDragIdx = zsIdx; zsDragEdge = 'top';
          e.preventDefault(); return;
        } else if (Math.abs(pt.y - zdY) < 15) {
          isDraggingZs = true; zsDragIdx = zsIdx; zsDragEdge = 'bottom';
          e.preventDefault(); return;
        }
      }
    }
  }

  // Pan: click-drag on empty space in kline mode
  if (currentKlines && chartLayout && chartLayout.klineMode &&
      !isDragging && !isDraggingZs && !drawingMode && !drawZsMode && !drawSegZsMode && !drawHigherMode && !drawStrokeMode) {
    const pt = svgPoint(e);
    if (pt && pt.x >= chartLayout.left && pt.x <= chartLayout.left + chartLayout.cW &&
        pt.y >= chartLayout.top && pt.y <= chartLayout.macdBottom) {
      isPanning = true;
      panStartX = e.clientX;
      const totalKlines = currentKlines.length;
      if (klineViewEnd <= klineViewStart) {
        panViewStart = 0;
        panViewEnd = totalKlines;
      } else {
        panViewStart = klineViewStart;
        panViewEnd = klineViewEnd;
      }
      e.preventDefault();
      chart.style.cursor = 'grabbing';
    }
  }
});

document.addEventListener('mousemove', function(e) {
  if (isDragging && dragIdx >= 0) {
    const pt = svgPoint(e);
    if (!pt) return;
    const yMin = chartLayout.top, yMax = chartLayout.priceBottom;
    const clampedY = Math.max(yMin, Math.min(yMax, pt.y));
    const rawPrice = yToPrice(clampedY);
    chart.querySelectorAll(`[data-idx="${dragIdx}"].tp-dot`).forEach(d => d.setAttribute('cy', clampedY));
    chart.querySelectorAll(`[data-idx="${dragIdx}"].tp-hit`).forEach(h => h.setAttribute('cy', clampedY));
    const label = chart.querySelector(`[data-idx="${dragIdx}"].tp-label`);
    if (label) {
      label.textContent = Math.round(rawPrice * 100) / 100;
      const prices = turningPoints, i = dragIdx;
      const isPeak = i > 0 && i < prices.length - 1 && prices[i] > prices[i-1] && prices[i] > prices[i+1];
      const isValley = i > 0 && i < prices.length - 1 && prices[i] < prices[i-1] && prices[i] < prices[i+1];
      const ly = isPeak ? clampedY - 14 : isValley ? clampedY + 20 : (i === 0 ? clampedY - 14 : clampedY + 20);
      label.setAttribute('y', ly);
    }
    updateZigzagPath(dragIdx, clampedY);
    return;
  }

  if (isDraggingZs && zsDragIdx >= 0 && chartLayout) {
    const pt = svgPoint(e);
    if (!pt) return;
    const yMin = chartLayout.top, yMax = chartLayout.priceBottom;
    const clampedY = Math.max(yMin, Math.min(yMax, pt.y));
    const price = Math.round(yToPrice(clampedY) * 100) / 100;
    const zs = zhongshuList[zsDragIdx];
    if (zsDragEdge === 'top') {
      zs.zg = Math.max(price, zs.zd + 0.01);
    } else {
      zs.zd = Math.min(price, zs.zg - 0.01);
    }
    redrawZhongshu();
    renderZhongshuList();
    return;
  }

  // Panning — right edge anchored, only move start
  if (isPanning && chartLayout) {
    const dx = e.clientX - panStartX;
    const klinesPerPx = (panViewEnd - panViewStart) / chartLayout.cW;
    const shift = -dx * klinesPerPx;
    let newStart = panViewStart + shift;
    newStart = Math.max(0, Math.min(panViewEnd - 10, newStart));
    klineViewStart = newStart;
    klineViewEnd = panViewEnd; // right edge stays fixed
    drawChart();
  }
});

document.addEventListener('mouseup', function(e) {
  if (isDragging && dragIdx >= 0) {
    const pt = svgPoint(e);
    let newPrice;
    if (pt) {
      const yMin = chartLayout.top, yMax = chartLayout.priceBottom;
      const clampedY = Math.max(yMin, Math.min(yMax, pt.y));
      newPrice = Math.round(yToPrice(clampedY) * 100) / 100;
    } else {
      newPrice = turningPoints[dragIdx];
    }
    turningPoints[dragIdx] = newPrice;
    strokes[dragIdx].val = newPrice;
    isDragging = false;
    dragIdx = -1;
    renderStrokeList();
    drawChart();
    return;
  }

  if (isDraggingZs && zsDragIdx >= 0) {
    isDraggingZs = false;
    zsDragIdx = -1;
    zsDragEdge = null;
    drawChart();
    return;
  }

  if (isPanning) {
    isPanning = false;
    chart.style.cursor = '';
  }
});

function updateZigzagPath(changedIdx, newY) {
  const path = chart.querySelector('path:not(.seg-line)');
  if (!path || !chartLayout) return;

  const prices = turningPoints;
  const toY = p => chartLayout.priceBottom - (p - chartLayout.minP) * chartLayout.yScale;
  const gap = chartLayout.cW / (turningPoints.length - 1);
  const toX = i => chartLayout.left + i * gap;

  let d = `M ${toX(0)} ${changedIdx === 0 ? newY : toY(prices[0])}`;
  for (let i = 1; i < prices.length; i++) {
    const y = i === changedIdx ? newY : toY(prices[i]);
    d += ` L ${toX(i)} ${y}`;
  }
  path.setAttribute('d', d);
}

window.addEventListener('resize', () => {
  if (turningPoints.length >= 2) drawChart();
});

// ====== Zoom / Pan (K线模式) ======
chart.addEventListener('wheel', function(e) {
  if (!currentKlines || !chartLayout || !chartLayout.klineMode) return;
  e.preventDefault();
  const pt = svgPoint(e);
  if (!pt) return;
  // Only zoom if cursor is inside chart area
  if (pt.x < chartLayout.left || pt.x > chartLayout.left + chartLayout.cW) return;

  const totalKlines = currentKlines.length;
  if (klineViewEnd <= klineViewStart) {
    klineViewStart = 0;
    klineViewEnd = totalKlines;
  }

  const range = klineViewEnd - klineViewStart;
  const frac = Math.max(0, Math.min(1, (pt.x - chartLayout.left) / chartLayout.cW));
  const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
  let newRange = range * factor;
  newRange = Math.max(10, Math.min(totalKlines, newRange));

  let newStart = klineViewStart + frac * (range - newRange);
  let newEnd = newStart + newRange;
  if (newStart < 0) { newStart = 0; newEnd = newRange; }
  if (newEnd > totalKlines) { newEnd = totalKlines; newStart = totalKlines - newRange; }

  klineViewStart = Math.max(0, newStart);
  klineViewEnd = Math.min(totalKlines, newEnd);
  drawChart();
}, { passive: false });

chart.addEventListener('dblclick', function(e) {
  if (!currentKlines) return;
  klineViewStart = 0;
  klineViewEnd = 0;
  drawChart();
});

// ====== Crosshair (Binance K线模式) ======
function initCrosshair() {
  if (chart.querySelector('.crosshair-h')) return;
  chart.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: 0, stroke: "rgba(255,255,255,0.25)", "stroke-width": 0.5, "stroke-dasharray": "4,3", class: "crosshair-h", display: "none" }));
  chart.appendChild(svgEl("line", { x1: 0, y1: 0, x2: 0, y2: 0, stroke: "rgba(255,255,255,0.25)", "stroke-width": 0.5, "stroke-dasharray": "4,3", class: "crosshair-v", display: "none" }));
  chart.appendChild(svgEl("rect", { x: 0, y: 0, width: 72, height: 18, fill: "#0f3460", stroke: "rgba(255,255,255,0.3)", "stroke-width": 0.5, rx: 3, class: "crosshair-y-bg", display: "none" }));
  chart.appendChild(svgEl("text", { x: 0, y: 0, fill: "#e0e0e0", "font-size": 11, "font-family": "SF Mono,Menlo,monospace", "text-anchor": "end", class: "crosshair-y-label", display: "none" }));
  chart.appendChild(svgEl("rect", { x: 0, y: 0, width: 30, height: 18, fill: "#0f3460", stroke: "rgba(255,255,255,0.3)", "stroke-width": 0.5, rx: 3, class: "crosshair-x-bg", display: "none" }));
  chart.appendChild(svgEl("text", { x: 0, y: 0, fill: "#e0e0e0", "font-size": 11, "font-family": "SF Mono,Menlo,monospace", "text-anchor": "middle", class: "crosshair-x-label", display: "none" }));
}

chart.addEventListener('mousemove', function(e) {
  if (!chartLayout) return;
  if (isDragging || isDraggingZs || isPanning || drawingMode || drawZsMode || drawSegZsMode || drawHigherMode) return;
  if (!currentKlines && !drawStrokeMode) return;

  const pt = svgPoint(e);
  if (!pt) return;

  const { top, priceBottom, left, cW, priceH, minP, yScale, klineMode, W, H, macdBottom } = chartLayout;
  const rightEdge = left + cW;

  if (pt.x < left || pt.x > rightEdge || pt.y < top || pt.y > H - 30) {
    hideCrosshair();
    chart.querySelectorAll('.snap-preview').forEach(el => el.remove());
    return;
  }

  // In drawStrokeMode, show snap preview instead of full crosshair
  if (drawStrokeMode) {
    chart.querySelectorAll('.snap-preview').forEach(el => el.remove());
    if (currentKlines) {
      const snap = findSnapPoint(pt);
      if (snap) {
        chart.appendChild(svgEl("circle", { cx: snap.x, cy: snap.y, r: 6, fill: snap.useHigh ? "rgba(255,80,80,0.6)" : "rgba(80,255,80,0.6)", stroke: "#fff", "stroke-width": 1.5, class: "snap-preview" }));
        // Show price label
        const yBg = chart.querySelector('.crosshair-y-bg');
        yBg.setAttribute('x', left - 76);
        yBg.setAttribute('y', snap.y - 9);
        yBg.setAttribute('display', '');
        const yLbl = chart.querySelector('.crosshair-y-label');
        yLbl.setAttribute('x', left - 8);
        yLbl.setAttribute('y', snap.y + 4);
        yLbl.textContent = (Math.round(snap.price * 100) / 100).toString();
        yLbl.setAttribute('display', '');
      }
    }
    return;
  }

  const hLine = chart.querySelector('.crosshair-h');
  hLine.setAttribute('x1', left);
  hLine.setAttribute('y1', pt.y);
  hLine.setAttribute('x2', rightEdge);
  hLine.setAttribute('y2', pt.y);
  hLine.setAttribute('display', '');

  const vLine = chart.querySelector('.crosshair-v');
  vLine.setAttribute('x1', pt.x);
  vLine.setAttribute('y1', top);
  vLine.setAttribute('x2', pt.x);
  vLine.setAttribute('y2', H - 30);
  vLine.setAttribute('display', '');

  // Price label (only when in price area)
  if (pt.y >= top && pt.y <= priceBottom) {
    const price = yToPrice(pt.y);
    const priceStr = (Math.round(price * 100) / 100).toString();
    const yBg = chart.querySelector('.crosshair-y-bg');
    yBg.setAttribute('x', left - 76);
    yBg.setAttribute('y', pt.y - 9);
    yBg.setAttribute('display', '');
    const yLbl = chart.querySelector('.crosshair-y-label');
    yLbl.setAttribute('x', left - 8);
    yLbl.setAttribute('y', pt.y + 4);
    yLbl.textContent = priceStr;
    yLbl.setAttribute('display', '');
  } else {
    chart.querySelector('.crosshair-y-bg').setAttribute('display', 'none');
    chart.querySelector('.crosshair-y-label').setAttribute('display', 'none');
  }

  // Time label at bottom
  if (klineMode && currentKlines) {
    const timeMin = chartLayout.timeMin;
    const timeRange = chartLayout.timeRange;
    const t = timeMin + (pt.x - left) / cW * timeRange;
    // Find nearest kline
    const dt = new Date(t);
    const txt = currentInterval && (currentInterval.includes('d') || currentInterval === '1w' || currentInterval === '1M')
      ? `${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')}`
      : `${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}`;
    const xBg = chart.querySelector('.crosshair-x-bg');
    xBg.setAttribute('x', pt.x - 20);
    xBg.setAttribute('y', H - 28);
    xBg.setAttribute('display', '');
    const xLbl = chart.querySelector('.crosshair-x-label');
    xLbl.setAttribute('x', pt.x);
    xLbl.setAttribute('y', H - 16);
    xLbl.textContent = txt;
    xLbl.setAttribute('display', '');
  }

});

chart.addEventListener('mouseleave', hideCrosshair);

function hideCrosshair() {
  chart.querySelectorAll('.crosshair-h,.crosshair-v,.crosshair-y-bg,.crosshair-y-label,.crosshair-x-bg,.crosshair-x-label').forEach(el => el.setAttribute('display', 'none'));
  chart.querySelectorAll('.snap-preview').forEach(el => el.remove());
}
</script>
</body>
</html>
