<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缠论K线 — 自选列表</title>
<style>
:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --fg: #111111;
  --muted: #6B6B6B;
  --border: #E5E5E5;
  --accent: #2F6FEB;
  --success: #17A34A;
  --danger: #DC2626;
  --warn: #EAB308;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --radius: 8px;
  --radius-sm: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Nav ── */
.top-nav {
  display: flex;
  align-items: center;
  height: 48px;
  padding: 0 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.nav-logo { font-weight: 700; font-size: 15px; color: var(--fg); margin-right: 8px; white-space: nowrap; letter-spacing: -0.02em; }
.nav-logo span { color: var(--accent); }

.nav-links { display: flex; gap: 2px; }
.nav-links a { text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 6px 10px; border-radius: var(--radius-sm); transition: all 0.15s; white-space: nowrap; }
.nav-links a:hover { color: var(--fg); background: var(--bg); }
.nav-links a.active { color: var(--accent); background: rgba(47,111,235,0.08); }

/* ── Page Header ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 260px;
  font-size: 13px;
  transition: border-color 0.15s;
}

.search-box:focus-within { border-color: var(--accent); }
.search-box input { border: none; outline: none; background: transparent; flex: 1; font-size: 13px; color: var(--fg); }
.search-box input::placeholder { color: var(--muted); }
.search-box .icon { color: var(--muted); font-size: 14px; }

/* ── Filter Tabs ── */
.filter-tabs {
  display: flex;
  gap: 2px;
  padding: 0 24px 12px;
}

.filter-tab {
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}

.filter-tab:hover { color: var(--fg); background: var(--surface); }
.filter-tab.active { color: var(--accent); background: rgba(47,111,235,0.08); }

/* ── Table ── */
.table-wrap {
  padding: 0 24px 24px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}

thead th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: pointer;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(47,111,235,0.03); }

td {
  padding: 12px 14px;
  font-size: 13px;
  white-space: nowrap;
}

.pair-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pair-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}

.pair-name { font-weight: 600; }
.pair-full { font-size: 11px; color: var(--muted); }

.price { font-family: var(--font-mono); font-weight: 600; }

.change { font-family: var(--font-mono); font-weight: 500; padding: 3px 8px; border-radius: var(--radius-sm); font-size: 12px; }
.change.up { color: var(--success); background: rgba(23,163,74,0.08); }
.change.down { color: var(--danger); background: rgba(220,38,38,0.08); }

.volume { font-family: var(--font-mono); color: var(--muted); font-size: 12px; }

.chan-status-cell { display: flex; align-items: center; gap: 6px; }

.chan-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
}

.chan-badge.buy { background: rgba(23,163,74,0.1); color: var(--success); }
.chan-badge.sell { background: rgba(220,38,38,0.1); color: var(--danger); }
.chan-badge.zhongshu { background: rgba(234,179,8,0.1); color: #B8860B; }
.chan-badge.neutral { background: var(--bg); color: var(--muted); }

.sparkline { width: 80px; height: 28px; }
.sparkline canvas { width: 100%; height: 100%; }

.action-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}

.action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

/* ── Responsive ── */
@media (max-width: 1023px) {
  .search-box { width: 200px; }
  .sparkline { display: none; }
}

@media (max-width: 767px) {
  .page-header { padding: 16px; }
  .table-wrap { padding: 0 16px 16px; }
  .search-box { width: 100%; }
  .filter-tabs { padding: 0 16px 10px; overflow-x: auto; }

  table { font-size: 12px; }
  td, th { padding: 8px 10px; }

  .pair-icon { display: none; }
  .pair-full { display: none; }
  .volume { display: none; }
  .filter-tabs { display: none; }
}

@media (max-width: 429px) {
  .page-header h1 { font-size: 17px; }
  .action-btn { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-logo">缠论<span>K线</span></div>
  <div class="nav-links">
    <a href="chart.html">📊 图表</a>
    <a href="watchlist.html" class="active">📋 自选</a>
    <a href="signals.html">🔔 信号</a>
    <a href="multi-tf.html">📐 多周期</a>
    <a href="settings.html">⚙</a>
  </div>
</nav>

<div class="page-header">
  <h1>自选列表</h1>
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" placeholder="搜索交易对…" id="searchInput">
  </div>
</div>

<div class="filter-tabs">
  <button class="filter-tab active">全部</button>
  <button class="filter-tab">有信号</button>
  <button class="filter-tab">买点附近</button>
  <button class="filter-tab">卖点附近</button>
  <button class="filter-tab">中枢震荡</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>交易对</th>
        <th>最新价</th>
        <th>24h 涨跌</th>
        <th>24h 成交量</th>
        <th>迷你走势</th>
        <th>缠论状态</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="watchlistBody">
    </tbody>
  </table>
</div>

<script>
const pairs = [
  { symbol: 'BTC', name: 'Bitcoin', pair: 'BTC/USDT', price: 66482.30, change: 2.34, volume: '28.5亿', chan: 'buy3', chanLabel: '三买确认' },
  { symbol: 'ETH', name: 'Ethereum', pair: 'ETH/USDT', price: 3521.80, change: 1.87, volume: '15.2亿', chan: 'buy2', chanLabel: '二买确认' },
  { symbol: 'SOL', name: 'Solana', pair: 'SOL/USDT', price: 148.65, change: -0.92, volume: '8.7亿', chan: 'sell1', chanLabel: '一卖触发' },
  { symbol: 'BNB', name: 'BNB', pair: 'BNB/USDT', price: 312.40, change: 0.56, volume: '4.3亿', chan: 'buy3', chanLabel: '三买形成' },
  { symbol: 'XRP', name: 'Ripple', pair: 'XRP/USDT', price: 0.6234, change: -1.45, volume: '3.8亿', chan: 'zhongshu', chanLabel: '中枢震荡' },
  { symbol: 'ADA', name: 'Cardano', pair: 'ADA/USDT', price: 0.5120, change: 3.21, volume: '2.1亿', chan: 'buy1', chanLabel: '一买预警' },
  { symbol: 'DOGE', name: 'Dogecoin', pair: 'DOGE/USDT', price: 0.0892, change: -2.18, volume: '5.6亿', chan: 'sell1', chanLabel: '一卖触发' },
  { symbol: 'AVAX', name: 'Avalanche', pair: 'AVAX/USDT', price: 38.75, change: 1.12, volume: '2.8亿', chan: 'zhongshu', chanLabel: '中枢震荡' },
  { symbol: 'DOT', name: 'Polkadot', pair: 'DOT/USDT', price: 7.85, change: 0.34, volume: '1.9亿', chan: 'neutral', chanLabel: '无信号' },
  { symbol: 'LINK', name: 'Chainlink', pair: 'LINK/USDT', price: 15.42, change: 4.56, volume: '3.2亿', chan: 'buy2', chanLabel: '二买确认' },
];

const tbody = document.getElementById('watchlistBody');

pairs.forEach(p => {
  const isUp = p.change >= 0;
  const chanClass = p.chan.startsWith('buy') ? 'buy' : p.chan.startsWith('sell') ? 'sell' : p.chan;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>
      <div class="pair-cell">
        <div class="pair-icon">${p.symbol.slice(0, 2)}</div>
        <div>
          <div class="pair-name">${p.symbol}</div>
          <div class="pair-full">${p.pair}</div>
        </div>
      </div>
    </td>
    <td><span class="price">${p.price.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span></td>
    <td><span class="change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${p.change.toFixed(2)}%</span></td>
    <td><span class="volume">$${p.volume}</span></td>
    <td><div class="sparkline"><canvas data-symbol="${p.symbol}"></canvas></div></td>
    <td>
      <div class="chan-status-cell">
        <span class="chan-badge ${chanClass}">${p.chanLabel}</span>
      </div>
    </td>
    <td><button class="action-btn" onclick="window.location.href='chart.html'">看图</button></td>
  `;
  tbody.appendChild(tr);
});

// Draw mini sparklines
document.querySelectorAll('.sparkline canvas').forEach(c => {
  const ctx = c.getContext('2d');
  const w = 80, h = 28;
  const dpr = window.devicePixelRatio || 1;
  c.width = w * dpr;
  c.height = h * dpr;
  ctx.scale(dpr, dpr);

  const points = [];
  let y = h / 2;
  for (let i = 0; i < 20; i++) {
    y += (Math.random() - 0.48) * 6;
    y = Math.max(4, Math.min(h - 4, y));
    points.push(y);
  }

  const isUp = points[points.length - 1] < points[0];
  ctx.strokeStyle = isUp ? '#17A34A' : '#DC2626';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  points.forEach((y, i) => {
    const x = (i / (points.length - 1)) * w;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
});

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('tbody tr').forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(q) ? '' : 'none';
  });
});
</script>
</body>
</html>
